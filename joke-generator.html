<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Random Joke Generator</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  padding: 40px;
  max-width: 600px;
  width: 100%;
  text-align: center;
  animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  color: #333;
  margin-bottom: 10px;
  font-size: 2.5em;
}

.subtitle {
  color: #666;
  margin-bottom: 30px;
  font-size: 1.1em;
}

.joke-box {
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  border-radius: 15px;
  padding: 30px;
  margin: 30px 0;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-left: 5px solid #667eea;
  box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
}

.joke-text {
  font-size: 1.2em;
  color: #333;
  line-height: 1.6;
  font-weight: 500;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.joke-type {
  color: #667eea;
  font-size: 0.9em;
  margin-top: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 30px 0;
}

button {
  padding: 12px 30px;
  font-size: 1em;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-primary {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  flex: 1;
  min-width: 150px;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
}

.btn-primary:active {
  transform: translateY(-1px);
}

.btn-secondary {
  background: #f0f0f0;
  color: #333;
  min-width: 120px;
}

.btn-secondary:hover {
  background: #e0e0e0;
  transform: translateY(-3px);
}

.btn-secondary:active {
  transform: translateY(-1px);
}

.filters {
  margin: 25px 0;
  padding: 20px;
  background: #f9f9f9;
  border-radius: 15px;
}

.filters h3 {
  color: #333;
  margin-bottom: 15px;
  font-size: 1.1em;
}

.filter-options {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 16px;
  border: 2px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
  color: #666;
}

.filter-btn:hover {
  border-color: #667eea;
  color: #667eea;
}

.filter-btn.active {
  background: #667eea;
  border-color: #667eea;
  color: white;
}

.loading {
  display: none;
  color: #667eea;
  font-size: 1.1em;
  margin: 20px 0;
  font-weight: 600;
}

.loading.active {
  display: block;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.error {
  display: none;
  background: #ffebee;
  color: #c62828;
  padding: 15px;
  border-radius: 10px;
  margin: 20px 0;
  border-left: 4px solid #c62828;
}

.error.active {
  display: block;
}

.stats {
  color: #999;
  font-size: 0.9em;
  margin-top: 20px;
}

.copy-btn {
  background: #4CAF50;
  color: white;
  padding: 8px 16px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9em;
  transition: all 0.3s ease;
  margin-top: 10px;
}

.copy-btn:hover {
  background: #45a049;
  transform: translateY(-2px);
}

.copy-feedback {
  display: none;
  color: #4CAF50;
  font-weight: 600;
  font-size: 0.9em;
  margin-top: 5px;
}

.copy-feedback.show {
  display: block;
  animation: fadeOut 2s ease-out forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

@media (max-width: 600px) {
  .container {
    padding: 25px;
  }

  h1 {
    font-size: 2em;
  }

  .controls {
    flex-direction: column;
  }

  .btn-primary {
    flex: none;
    width: 100%;
  }

  .filter-options {
    flex-direction: column;
  }

  .filter-btn {
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>😂 Joke Generator</h1>
  <p class="subtitle">Get random jokes instantly!</p>

  <div class="filters">
    <h3>Joke Type</h3>
    <div class="filter-options">
      <button class="filter-btn active" data-type="any">Any</button>
      <button class="filter-btn" data-type="single">Single</button>
      <button class="filter-btn" data-type="twopart">Two Part</button>
    </div>
  </div>

  <div class="joke-box">
    <div class="joke-text" id="jokeText">Click "Get Joke" to start!</div>
    <div class="joke-type" id="jokeType"></div>
  </div>

  <div class="loading" id="loading">
    ⏳ Loading joke...
  </div>

  <div class="error" id="error"></div>

  <div class="controls">
    <button class="btn-primary" id="getJokeBtn">Get Joke</button>
    <button class="btn-secondary" id="copyBtn">Copy</button>
  </div>

  <button class="copy-btn" id="shareBtn">Share</button>
  <div class="copy-feedback" id="copyFeedback"></div>

  <div class="stats">
    <p>Jokes fetched: <strong id="jokeCount">0</strong></p>
  </div>
</div>

<script>
let currentJoke = null;
let jokeCount = 0;
let selectedType = 'any';

const jokeTextEl = document.getElementById('jokeText');
const jokeTypeEl = document.getElementById('jokeType');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');
const getJokeBtn = document.getElementById('getJokeBtn');
const copyBtn = document.getElementById('copyBtn');
const shareBtn = document.getElementById('shareBtn');
const jokeCountEl = document.getElementById('jokeCount');
const copyFeedbackEl = document.getElementById('copyFeedback');

const filterBtns = document.querySelectorAll('.filter-btn');

// Filter buttons event listeners
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
    console.log('Selected type:', selectedType);
  });
});

// Fetch joke from API
async function fetchJoke() {
  loadingEl.classList.add('active');
  errorEl.classList.remove('active');
  getJokeBtn.disabled = true;

  try {
    let url = 'https://v2.jokeapi.dev/joke/';
    
    if (selectedType === 'any') {
      url += 'Any';
    } else if (selectedType === 'single') {
      url += 'Any?type=single';
    } else if (selectedType === 'twopart') {
      url += 'Any?type=twopart';
    }

    const response = await fetch(url);
    
    if (!response.ok) {
      throw new Error('Failed to fetch joke');
    }

    const data = await response.json();

    if (data.error) {
      throw new Error('Could not fetch joke. Try again!');
    }

    currentJoke = data;
    displayJoke(data);
    jokeCount++;
    jokeCountEl.textContent = jokeCount;

  } catch (error) {
    showError(error.message);
    console.error('Error:', error);
  } finally {
    loadingEl.classList.remove('active');
    getJokeBtn.disabled = false;
  }
}

// Display joke
function displayJoke(joke) {
  if (joke.type === 'single') {
    jokeTextEl.textContent = joke.joke;
    jokeTypeEl.textContent = 'Single Punchline Joke';
  } else if (joke.type === 'twopart') {
    jokeTextEl.textContent = `${joke.setup}\n\n${joke.delivery}`;
    jokeTypeEl.textContent = 'Two Part Joke';
  }
}

// Show error message
function showError(message) {
  errorEl.textContent = '❌ ' + message;
  errorEl.classList.add('active');
  jokeTextEl.textContent = 'Error loading joke. Please try again!';
  jokeTypeEl.textContent = '';
}

// Copy joke to clipboard
function copyJoke() {
  if (!currentJoke) return;

  let jokeText = '';
  if (currentJoke.type === 'single') {
    jokeText = currentJoke.joke;
  } else if (currentJoke.type === 'twopart') {
    jokeText = `${currentJoke.setup}\n${currentJoke.delivery}`;
  }

  navigator.clipboard.writeText(jokeText).then(() => {
    copyFeedbackEl.textContent = '✓ Copied to clipboard!';
    copyFeedbackEl.classList.add('show');
    setTimeout(() => {
      copyFeedbackEl.classList.remove('show');
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy:', err);
  });
}

// Share joke
function shareJoke() {
  if (!currentJoke) return;

  let jokeText = '';
  if (currentJoke.type === 'single') {
    jokeText = currentJoke.joke;
  } else if (currentJoke.type === 'twopart') {
    jokeText = `${currentJoke.setup}\n${currentJoke.delivery}`;
  }

  if (navigator.share) {
    navigator.share({
      title: 'Check out this joke!',
      text: jokeText
    }).catch(err => console.error('Error sharing:', err));
  } else {
    // Fallback: copy to clipboard
    copyJoke();
  }
}

// Event listeners
getJokeBtn.addEventListener('click', fetchJoke);
copyBtn.addEventListener('click', copyJoke);
shareBtn.addEventListener('click', shareJoke);

// Fetch initial joke on load
window.addEventListener('load', fetchJoke);

// Allow Enter key to fetch joke
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    fetchJoke();
  }
});
</script>

</body>
</html>
