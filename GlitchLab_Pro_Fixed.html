<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlitchLab Pro</title>
<style>
body{margin:0;background:#090909;color:#fff;font-family:system-ui}
#ui{position:fixed;left:0;top:0;width:320px;height:100vh;overflow:auto;background:#151515;padding:15px;box-sizing:border-box;z-index:100}
#view{margin-left:320px;padding:10px}
canvas{max-width:100%;border:1px solid #333;display:block}
label{display:block;margin:10px 0;font-size:14px}
input[type=range]{width:100%}
button{padding:8px 12px;margin:4px;cursor:pointer;background:#333;color:#fff;border:1px solid #555;border-radius:4px;transition:0.2s}
button:hover{background:#444}
button:active{transform:scale(0.98)}
#status{margin-top:10px;padding:8px;background:#1a1a1a;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<div id="ui">
<h2>GlitchLab Pro</h2>
<button id="start">カメラ開始</button>
<button id="stop" disabled>カメラ停止</button>
<button id="save" disabled>保存</button>
<div id="status">準備完了</div>

<label>ノイズ <input id="noise" type="range" min="0" max="150" value="40"></label>
<label>RGBシフト <input id="rgb" type="range" min="0" max="30" value="8"></label>
<label>走査線 <input id="scan" type="range" min="0" max="100" value="40"></label>
<label>モザイク <input id="pixel" type="range" min="1" max="40" value="1"></label>
<label>波打ち歪み <input id="wave" type="range" min="0" max="50" value="10"></label>
<label>色収差 <input id="ab" type="range" min="0" max="20" value="5"></label>
<label>グリッチ量 <input id="glitch" type="range" min="0" max="30" value="8"></label>
<label><input id="invert" type="checkbox"> 色反転</label>
</div>

<div id="view">
<video id="video" autoplay playsinline hidden></video>
<canvas id="canvas"></canvas>
</div>

<script>
const v=document.getElementById('video');
const c=document.getElementById('canvas');
const ctx=c.getContext('2d');
let animationId=null;
let mediaStream=null;

start.onclick=async()=>{
 try{
   status.textContent='カメラにアクセス中...';
   const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
   mediaStream=s;
   v.srcObject=s;
   await v.play();
   c.width=v.videoWidth;
   c.height=v.videoHeight;
   start.disabled=true;
   stop.disabled=false;
   save.disabled=false;
   status.textContent='実行中';
   loop();
 }catch(e){
   status.textContent='エラー: '+e.message;
   console.error(e);
 }
};

stop.onclick=()=>{
 if(mediaStream){
   mediaStream.getTracks().forEach(t=>t.stop());
   mediaStream=null;
 }
 if(animationId){
   cancelAnimationFrame(animationId);
   animationId=null;
 }
 start.disabled=false;
 stop.disabled=true;
 save.disabled=true;
 status.textContent='停止中';
};

function loop(){
 ctx.drawImage(v,0,0,c.width,c.height);

 let img=ctx.getImageData(0,0,c.width,c.height);
 let d=img.data;

 const n=+noise.value;
 const rgbs=+rgb.value;
 const g=+glitch.value;

 // ノイズ効果
 for(let i=0;i<d.length;i+=4){
   let r=(Math.random()-0.5)*n;
   d[i]=Math.max(0,Math.min(255,d[i]+r));
   d[i+1]=Math.max(0,Math.min(255,d[i+1]+r));
   d[i+2]=Math.max(0,Math.min(255,d[i+2]+r));

   if(invert.checked){
      d[i]=255-d[i];
      d[i+1]=255-d[i+1];
      d[i+2]=255-d[i+2];
   }
 }

 // RGBシフト
 for(let y=0;y<c.height;y++){
   let shift=Math.floor(Math.sin(y/15)*rgbs);
   for(let x=0;x<c.width-Math.abs(shift)-1;x++){
      let p=(y*c.width+x)*4;
      let q=(y*c.width+x+shift)*4;
      if(q<d.length-4){
        d[p]=d[q];
      }
   }
 }

 ctx.putImageData(img,0,0);

 // 波打ち歪み
 let waveAmp=+wave.value;
 for(let y=0;y<c.height;y+=2){
   let dx=Math.sin((y+performance.now()/20)/20)*waveAmp;
   ctx.drawImage(c,0,y,c.width,2,dx,y,c.width,2);
 }

 // モザイク
 let pix=+pixel.value;
 if(pix>1){
   let w=Math.floor(c.width/pix);
   let h=Math.floor(c.height/pix);
   ctx.imageSmoothingEnabled=false;
   ctx.drawImage(c,0,0,c.width,c.height,0,0,w,h);
   ctx.drawImage(c,0,0,w,h,0,0,c.width,c.height);
 }

 // 走査線
 let sc=+scan.value/100;
 if(sc>0){
   ctx.fillStyle=`rgba(0,0,0,${sc})`;
   for(let y=0;y<c.height;y+=4){
     ctx.fillRect(0,y,c.width,2);
   }
 }

 // 色収差
 let ca=+ab.value;
 if(ca>0){
   ctx.globalCompositeOperation='screen';
   ctx.drawImage(c,ca,0);
   ctx.globalCompositeOperation='source-over';
 }

 // グリッチ
 for(let i=0;i<g;i++){
   let y=Math.random()*c.height;
   let h=5+Math.random()*40;
   ctx.drawImage(c,0,y,c.width,h,(Math.random()-0.5)*60,y,c.width,h);
 }

 animationId=requestAnimationFrame(loop);
}

save.onclick=()=>{
 const a=document.createElement('a');
 a.href=c.toDataURL('image/png');
 a.download='glitchlab-pro-'+Date.now()+'.png';
 a.click();
};
</script>
</body>
</html>
