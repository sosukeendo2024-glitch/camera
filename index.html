<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GlitchLab Pro - Cyber Edition</title>
<style>
:root {
  --bg-base: #0a0a0f;
  --bg-panel: rgba(16, 16, 24, 0.9);
  --border-color: rgba(0, 255, 170, 0.15);
  --accent-green: #00ffaa;
  --accent-purple: #bd00ff;
  --text-main: #f0f0f5;
  --text-muted: #8a8a9e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-base); -webkit-user-select: none; user-select: none; }
body { font-family: system-ui, -apple-system, sans-serif; color: var(--text-main); }
#container { display: flex; width: 100%; height: 100vh; flex-direction: column; position: relative; }

#canvas { flex: 1; width: 100%; height: 100%; display: block; background: #000; object-fit: cover; }
video, #uploadInput, #uploadedImage { display: none; }

/* 洗練されたトップステータスバー */
.top-controls {
  position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; background: linear-gradient(to bottom, rgba(10,10,15,0.9), rgba(10,10,15,0)); z-index: 50; font-size: 11px;
}
#fps { color: var(--accent-green); font-weight: 700; font-family: monospace; letter-spacing: 1px; }
#mode { color: #0ffff0; background: rgba(0, 255, 255, 0.1); padding: 4px 8px; border-radius: 4px; font-weight: 600; }
#progress { color: #ff9900; font-weight: bold; }
#status { font-size: 11px; color: var(--text-main); padding: 4px 10px; background: rgba(255,255,255,0.05); border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

/* コントロールUIパネル */
#ui {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-panel); padding: 16px;
  max-height: 48vh; overflow-y: auto; z-index: 100; border-top: 1px solid var(--border-color);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px 20px 0 0;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
}
#ui h2 { font-size: 15px; margin-bottom: 12px; text-align: center; color: var(--text-main); letter-spacing: 2px; font-weight: 800; }

/* セクション設定 */
.section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.section h3 { font-size: 10px; text-transform: uppercase; color: var(--accent-green); margin-bottom: 10px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 6px; }
.section h3::before { content: ''; display: inline-block; width: 3px; height: 10px; background: var(--accent-green); border-radius: 1px; }

/* グリッドボタン */
.button-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
.button-group-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }

button {
  padding: 10px; background: rgba(255, 255, 255, 0.04); color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
button:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: var(--accent-green); }
button:active:not(:disabled) { transform: scale(0.96); }
button:disabled { opacity: 0.2; cursor: not-allowed; }

/* 特殊カラーボタン */
#start { background: linear-gradient(135deg, #0055ff, #0033aa); border: none; }
#uploadBtn { background: linear-gradient(135deg, #ff6600, #cc4400); border: none; }
#save { background: linear-gradient(135deg, #00aa55, #006633); border: none; }
#recordBtn { background: #c41e3a; grid-column: span 2; border: none; }
#recordBtn.recording { background: #00ff00; color: #000; animation: blink 0.5s infinite; font-weight: 700; }
#cameraToggle { background: rgba(255,255,255,0.08); }
#saveVideoBtn { background: linear-gradient(135deg, #00aa55, #006633); grid-column: span 2; border: none; }
#reset { background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.2); color: #ff5555; }

select {
  width: 100%; padding: 10px; background: rgba(0,0,0,0.3); color: var(--text-main);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; margin: 4px 0; font-size: 12px; outline: none;
}

/* パラメータスライダー */
.param-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0 4px 0; font-size: 11px; color: var(--text-muted); }
.param-value { color: var(--text-main); font-weight: 700; font-family: monospace; }

input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text-main); cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 6px rgba(255,255,255,0.4); }
input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.3); background: var(--accent-green); }

/* チェックボックス */
.checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 6px; }
.checkbox-item { display: flex; align-items: center; font-size: 11px; color: var(--text-muted); cursor: pointer; }
.checkbox-item input { margin-right: 6px; accent-color: var(--accent-green); width: 14px; height: 14px; }

@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.7; } }
#ui::-webkit-scrollbar { width: 4px; }
#ui::-webkit-scrollbar-track { background: transparent; }
#ui::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<div id="container">
  <div class="top-controls">
    <div id="fps">FPS: 0</div>
    <div id="mode">📷 カメラ</div>
    <div id="progress"></div>
    <div id="status">準備完了</div>
  </div>

  <canvas id="canvas"></canvas>
  <video id="video" autoplay playsinline></video>
  <img id="uploadedImage">
  <input type="file" id="uploadInput" accept="image/*,video/*">

  <div id="ui">
    <h2>AETHER // GLITCH LAB</h2>

    <div class="section">
      <h3>コントロール</h3>
      <div class="button-group">
        <button id="start">📷 開始</button>
        <button id="stop" disabled>⏹ 停止</button>
        <button id="uploadBtn">📤 ファイル</button>
      </div>
      <div class="button-group-2">
        <button id="cameraToggle" disabled>🔄 切替</button>
        <button id="recordBtn" disabled>🔴 録画</button>
      </div>
      <div class="button-group-2">
        <button id="save" disabled>💾 画像保存</button>
        <button id="saveVideoBtn" disabled>🎥 MP4保存</button>
      </div>
      <button id="reset" style="width: 100%;">↺ パラメータリセット</button>
    </div>

    <div class="section">
      <h3>シネマティックプリセット</h3>
      <select id="preset">
        <option value="">-- プリセット選択 --</option>
        <option value="cyberpunk">🌃 Cyberpunk</option>
        <option value="vhs">📼 VHS</option>
        <option value="matrix">🟢 Matrix</option>
        <option value="glitch">⚡ Glitch</option>
        <option value="retro">🎮 Retro</option>
        <option value="dream">✨ Dream</option>
      </select>
    </div>

    <div class="section">
      <h3>ノイズコア</h3>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="noiseType1" checked> 細かい</label>
        <label class="checkbox-item"><input type="checkbox" id="noiseType2"> 粗い</label>
        <label class="checkbox-item"><input type="checkbox" id="noiseType3"> パルス</label>
        <label class="checkbox-item"><input type="checkbox" id="noiseType4"> グラデ</label>
      </div>

      <div class="param-row"><label>ノイズ量</label><span class="param-value" id="noiseVal">40</span></div>
      <input id="noise" type="range" min="0" max="150" value="40">

      <div class="param-row"><label>ノイズ細かさ</label><span class="param-value" id="noiseSizeVal">1.0</span></div>
      <input id="noiseSize" type="range" min="0.5" max="10" step="0.5" value="1">
    </div>

    <div class="section">
      <h3>アナログカラー</h3>
      <div class="param-row"><label>RGBシフト</label><span class="param-value" id="rgbVal">8</span></div>
      <input id="rgb" type="range" min="0" max="30" value="8">

      <div class="param-row"><label>走査線</label><span class="param-value" id="scanVal">40</span></div>
      <input id="scan" type="range" min="0" max="100" value="40">

      <div class="param-row"><label>彩度</label><span class="param-value" id="saturationVal">100</span></div>
      <input id="saturation" type="range" min="0" max="200" value="100">

      <div class="param-row"><label>明るさ</label><span class="param-value" id="brightnessVal">100</span></div>
      <input id="brightness" type="range" min="0" max="200" value="100">
    </div>

    <div class="section">
      <h3>歪みエフェクトマトリクス</h3>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="distType1" checked> 波打ち</label>
        <label class="checkbox-item"><input type="checkbox" id="distType2"> 樽</label>
        <label class="checkbox-item"><input type="checkbox" id="distType3"> ピンク</label>
        <label class="checkbox-item"><input type="checkbox" id="distType4"> ツイスト</label>
        <label class="checkbox-item"><input type="checkbox" id="distType5"> レンズ</label>
      </div>

      <div class="param-row"><label>波打ち歪み</label><span class="param-value" id="waveVal">10</span></div>
      <input id="wave" type="range" min="0" max="50" value="10">

      <div class="param-row"><label>樽歪み</label><span class="param-value" id="barrelVal">0</span></div>
      <input id="barrel" type="range" min="0" max="50" value="0">

      <div class="param-row"><label>ピンクッション</label><span class="param-value" id="pincushionVal">0</span></div>
      <input id="pincushion" type="range" min="0" max="50" value="0">

      <div class="param-row"><label>ツイスト</label><span class="param-value" id="twistVal">0</span></div>
      <input id="twist" type="range" min="0" max="50" value="0">

      <div class="param-row"><label>色収差</label><span class="param-value" id="abVal">5</span></div>
      <input id="ab" type="range" min="0" max="20" value="5">

      <div class="param-row"><label>グリッチ量</label><span class="param-value" id="glitchVal">8</span></div>
      <input id="glitch" type="range" min="0" max="30" value="8">

      <div class="param-row"><label>モザイク</label><span class="param-value" id="pixelVal">1</span></div>
      <input id="pixel" type="range" min="1" max="40" value="1">
    </div>

    <div class="section">
      <h3>特殊フィルター</h3>
      <div class="param-row"><label>ポスター化</label><span class="param-value" id="posterVal">0</span></div>
      <input id="poster" type="range" min="0" max="8" value="0">

      <div class="checkbox-group">
        <label class="checkbox-item"><input id="invert" type="checkbox"> 色反転</label>
        <label class="checkbox-item"><input id="mirror" type="checkbox"> 水平反転</label>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
const v = document.getElementById('video');
const c = document.getElementById('canvas');
const ctx = c.getContext('2d');
const uploadedImg = document.getElementById('uploadedImage');
const uploadInput = document.getElementById('uploadInput');
let animationId = null;
let mediaStream = null;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let useFrontCamera = true;
let currentMode = 'camera';
let uploadedVideo = null;

function resizeCanvas() {
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// FPSカウンター
let fps = 0, lastTime = Date.now(), frameCount = 0;
setInterval(() => {
  const now = Date.now();
  fps = Math.round(frameCount * 1000 / (now - lastTime));
  document.getElementById('fps').textContent = `FPS: ${fps}`;
  frameCount = 0;
  lastTime = now;
}, 1000);

// スライダーの値表示更新
['noise', 'noiseSize', 'rgb', 'scan', 'pixel', 'wave', 'barrel', 'pincushion', 'twist', 'ab', 'glitch', 'poster', 'saturation', 'brightness'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(id + 'Val').textContent = parseFloat(e.target.value).toFixed(1);
  });
});

const presets = {
  cyberpunk: { noise: 60, noiseSize: 1, rgb: 15, scan: 60, pixel: 2, wave: 15, barrel: 10, pincushion: 0, twist: 5, ab: 8, glitch: 15, poster: 0, saturation: 150, brightness: 110, invert: false, mirror: false },
  vhs: { noise: 80, noiseSize: 1.5, rgb: 8, scan: 80, pixel: 1, wave: 5, barrel: 0, pincushion: 0, twist: 0, ab: 3, glitch: 5, poster: 0, saturation: 80, brightness: 90, invert: false, mirror: false },
  matrix: { noise: 20, noiseSize: 0.5, rgb: 0, scan: 30, pixel: 1, wave: 0, barrel: 0, pincushion: 0, twist: 0, ab: 0, glitch: 0, poster: 0, saturation: 50, brightness: 100, invert: false, mirror: false },
  glitch: { noise: 100, noiseSize: 2, rgb: 20, scan: 50, pixel: 3, wave: 20, barrel: 5, pincushion: 5, twist: 8, ab: 10, glitch: 25, poster: 2, saturation: 120, brightness: 100, invert: false, mirror: false },
  retro: { noise: 40, noiseSize: 2, rgb: 5, scan: 40, pixel: 4, wave: 0, barrel: 2, pincushion: 0, twist: 0, ab: 2, glitch: 3, poster: 3, saturation: 100, brightness: 100, invert: false, mirror: false },
  dream: { noise: 30, noiseSize: 1, rgb: 10, scan: 20, pixel: 1, wave: 30, barrel: 15, pincushion: 10, twist: 3, ab: 8, glitch: 5, poster: 1, saturation: 130, brightness: 110, invert: false, mirror: false }
};

document.getElementById('preset').addEventListener('change', e => {
  if (e.target.value && presets[e.target.value]) {
    const p = presets[e.target.value];
    ['noise', 'noiseSize', 'rgb', 'scan', 'pixel', 'wave', 'barrel', 'pincushion', 'twist', 'ab', 'glitch', 'poster', 'saturation', 'brightness'].forEach(id => {
      document.getElementById(id).value = p[id];
      document.getElementById(id + 'Val').textContent = parseFloat(p[id]).toFixed(1);
    });
    document.getElementById('invert').checked = p.invert;
    document.getElementById('mirror').checked = p.mirror;
  }
});

document.getElementById('reset').onclick = () => {
  ['noise', 'rgb', 'scan', 'pixel', 'wave', 'barrel', 'pincushion', 'twist', 'ab', 'glitch', 'poster', 'saturation', 'brightness'].forEach(id => {
    const defaultVal = id === 'saturation' || id === 'brightness' ? 100 : id === 'pixel' ? 1 : 0;
    document.getElementById(id).value = defaultVal;
    document.getElementById(id + 'Val').textContent = defaultVal;
  });
  document.getElementById('noiseSize').value = 1;
  document.getElementById('noiseSizeVal').textContent = '1.0';
  document.getElementById('invert').checked = false;
  document.getElementById('mirror').checked = false;
  ['noiseType1', 'noiseType2', 'noiseType3', 'noiseType4'].forEach((id, i) => { document.getElementById(id).checked = (i === 0); });
  ['distType1', 'distType2', 'distType3', 'distType4', 'distType5'].forEach((id, i) => { document.getElementById(id).checked = (i === 0); });
};

// ファイル読み込み処理
document.getElementById('uploadBtn').onclick = () => uploadInput.click();
uploadInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('status').textContent = 'ファイル読込中...';
  killStreams();

  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedImg.onload = () => {
        currentMode = 'image';
        document.getElementById('mode').textContent = '🖼️ 画像';
        setUIAfterStart();
        document.getElementById('saveVideoBtn').disabled = true;
        document.getElementById('status').textContent = '画像読込完了';
        loop();
      };
      uploadedImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  } else if (file.type.startsWith('video/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedVideo = document.createElement('video');
      uploadedVideo.autoplay = true;
      uploadedVideo.loop = true;
      uploadedVideo.playsInline = true;
      uploadedVideo.muted = true;
      uploadedVideo.onloadedmetadata = () => {
        currentMode = 'video';
        document.getElementById('mode').textContent = '🎬 動画';
        setUIAfterStart();
        document.getElementById('saveVideoBtn').disabled = false;
        document.getElementById('status').textContent = '動画読込完了';
        uploadedVideo.play();
        loop();
      };
      uploadedVideo.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  uploadInput.value = '';
});

// カメラ開始
document.getElementById('start').onclick = async () => {
  try {
    document.getElementById('status').textContent = 'カメラ接続中...';
    killStreams();

    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: useFrontCamera ? 'user' : 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    v.srcObject = mediaStream;
    await v.play();

    currentMode = 'camera';
    document.getElementById('mode').textContent = '📷 カメラ';
    setUIAfterStart();

    // 録画エンジンのセットアップ
    let options = { mimeType: 'video/webm;codecs=vp9' };
    if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
    mediaRecorder = new MediaRecorder(mediaStream, options);
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'glitchlab-' + Date.now() + '.webm';
      a.click();
      document.getElementById('status').textContent = '保存完了';
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('recordBtn').textContent = '🔴 録画';
      isRecording = false;
    };

    loop();
  } catch (e) {
    document.getElementById('status').textContent = 'エラー: ' + e.message;
  }
};

function setUIAfterStart() {
  document.getElementById('start').disabled = true;
  document.getElementById('stop').disabled = false;
  document.getElementById('save').disabled = false;
  document.getElementById('recordBtn').disabled = (currentMode !== 'camera');
  document.getElementById('cameraToggle').disabled = (currentMode !== 'camera');
  document.getElementById('status').textContent = '実行中';
}

function killStreams() {
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (uploadedVideo) { uploadedVideo.pause(); uploadedVideo = null; }
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  if (isRecording) { mediaRecorder.stop(); isRecording = false; }
}

document.getElementById('stop').onclick = () => {
  killStreams();
  document.getElementById('start').disabled = false;
  document.getElementById('stop').disabled = true;
  document.getElementById('save').disabled = true;
  document.getElementById('recordBtn').disabled = true;
  document.getElementById('cameraToggle').disabled = true;
  document.getElementById('saveVideoBtn').disabled = true;
  document.getElementById('status').textContent = '停止中';
};

document.getElementById('cameraToggle').onclick = () => {
  useFrontCamera = !useFrontCamera;
  document.getElementById('start').click();
};

document.getElementById('recordBtn').onclick = () => {
  if (!isRecording) {
    recordedChunks = [];
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordBtn').textContent = '⏹ 停止';
  } else {
    mediaRecorder.stop();
  }
};

// --- エフェクト処理ロジック (完全移植) ---
function getEffectParams() {
  return {
    noise: +document.getElementById('noise').value,
    noiseSize: +document.getElementById('noiseSize').value,
    noiseTypes: [
      document.getElementById('noiseType1').checked,
      document.getElementById('noiseType2').checked,
      document.getElementById('noiseType3').checked,
      document.getElementById('noiseType4').checked
    ],
    rgb: +document.getElementById('rgb').value,
    scan: +document.getElementById('scan').value,
    pixel: +document.getElementById('pixel').value,
    wave: +document.getElementById('wave').value,
    barrel: +document.getElementById('barrel').value,
    pincushion: +document.getElementById('pincushion').value,
    twist: +document.getElementById('twist').value,
    distTypes: [
      document.getElementById('distType1').checked,
      document.getElementById('distType2').checked,
      document.getElementById('distType3').checked,
      document.getElementById('distType4').checked,
      document.getElementById('distType5').checked
    ],
    ab: +document.getElementById('ab').value,
    glitch: +document.getElementById('glitch').value,
    poster: +document.getElementById('poster').value,
    saturation: +document.getElementById('saturation').value / 100,
    brightness: +document.getElementById('brightness').value / 100,
    invert: document.getElementById('invert').checked,
    mirror: document.getElementById('mirror').checked
  };
}

function applyNoise(d, w, h, amount, size, types) {
  if (amount <= 0) return;
  const pixelSize = Math.max(1, Math.floor(size));
  for (let y = 0; y < h; y += pixelSize) {
    for (let x = 0; x < w; x += pixelSize) {
      let noiseValue = 0;
      if (types[0]) noiseValue += (Math.random() - 0.5) * amount * 0.5;
      if (types[1]) noiseValue += (Math.random() - 0.5) * amount * Math.sin(x / 20) * Math.cos(y / 20);
      if (types[2]) noiseValue += (Math.random() > 0.8 ? (Math.random() - 0.5) * amount : 0);
      if (types[3]) noiseValue += ((Math.sin(x / 50) + Math.cos(y / 50)) / 2) * (Math.random() - 0.5) * amount;
      
      for (let dy = 0; dy < pixelSize && y + dy < h; dy++) {
        for (let dx = 0; dx < pixelSize && x + dx < w; dx++) {
          const i = ((y + dy) * w + (x + dx)) * 4;
          d[i] = Math.max(0, Math.min(255, d[i] + noiseValue));
          d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + noiseValue));
          d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + noiseValue));
        }
      }
    }
  }
}

function applyDistortion(img, w, h, ctxRef, types, params) {
  let d = img.data;
  if (types[0] && params.wave > 0) {
    for (let y = 0; y < h; y += 2) {
      let dx = Math.sin((y + performance.now() / 20) / 20) * params.wave;
      ctxRef.drawImage(ctxRef.canvas, 0, y, w, 2, dx, y, w, 2);
    }
  }
  if (types[2] && params.pincushion > 0) {
    const cx = w / 2, cy = h / 2; const r = Math.sqrt(cx * cx + cy * cy); const k = params.pincushion / 100;
    const newImg = new ImageData(w, h); const newD = newImg.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = x - cx, dy = y - cy; const dist = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(dy, dx);
        const newDist = dist / (1 + k * (dist / r)); const nx = Math.round(cx + Math.cos(angle) * newDist); const ny = Math.round(cy + Math.sin(angle) * newDist);
        if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
          const idx = (y * w + x) * 4; const srcIdx = (ny * w + nx) * 4;
          newD[idx] = d[srcIdx]; newD[idx + 1] = d[srcIdx + 1]; newD[idx + 2] = d[srcIdx + 2]; newD[idx + 3] = d[srcIdx + 3];
        }
      }
    }
    for (let i = 0; i < d.length; i++) d[i] = newImg.data[i];
  }
  if (types[3] && params.twist > 0) {
    const cx = w / 2, cy = h / 2; const newImg = new ImageData(w, h); const newD = newImg.data; const maxDist = Math.sqrt(cx * cx + cy * cy);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = x - cx, dy = y - cy; const dist = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(dy, dx);
        const twistAmount = (1 - dist / maxDist) * params.twist * Math.PI / 180; const newAngle = angle + twistAmount;
        const nx = Math.round(cx + Math.cos(newAngle) * dist); const ny = Math.round(cy + Math.sin(newAngle) * dist);
        if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
          const idx = (y * w + x) * 4; const srcIdx = (ny * w + nx) * 4;
          newD[idx] = d[srcIdx]; newD[idx + 1] = d[srcIdx + 1]; newD[idx + 2] = d[srcIdx + 2]; newD[idx + 3] = d[srcIdx + 3];
        }
      }
    }
    for (let i = 0; i < d.length; i++) d[i] = newImg.data[i];
  }
}

function applyEffects(img, w, h, ctxRef) {
  const params = getEffectParams();
  let d = img.data;

  applyNoise(d, w, h, params.noise, params.noiseSize, params.noiseTypes);

  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    let gray = (r + g + b) / 3;
    r = gray + (r - gray) * params.saturation; g = gray + (g - gray) * params.saturation; b = gray + (b - gray) * params.saturation;
    d[i] = Math.max(0, Math.min(255, r * params.brightness));
    d[i + 1] = Math.max(0, Math.min(255, g * params.brightness));
    d[i + 2] = Math.max(0, Math.min(255, b * params.brightness));

    if (params.invert) { d[i] = 255 - d[i]; d[i + 1] = 255 - d[i + 1]; d[i + 2] = 255 - d[i + 2]; }
    if (params.poster > 0) {
      const levels = Math.pow(2, 8 - params.poster);
      d[i] = Math.floor(d[i] / levels) * levels; d[i + 1] = Math.floor(d[i + 1] / levels) * levels; d[i + 2] = Math.floor(d[i + 2] / levels) * levels;
    }
  }

  // RGBシフト
  for (let y = 0; y < h; y++) {
    let shift = Math.floor(Math.sin(y / 15) * params.rgb);
    for (let x = 0; x < w - Math.abs(shift) - 1; x++) {
      let p = (y * w + x) * 4; let q = (y * w + x + shift) * 4;
      if (q < d.length - 4) d[p] = d[q];
    }
  }

  // 走査線
  if (params.scan > 0) {
    const scanAlpha = params.scan / 100;
    for (let y = 0; y < h; y += 4) {
      for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;
        d[idx] *= (1 - scanAlpha); d[idx + 1] *= (1 - scanAlpha); d[idx + 2] *= (1 - scanAlpha);
      }
    }
  }

  // モザイク
  if (params.pixel > 1 && ctxRef) {
    const tempCanvas = document.createElement('canvas'); tempCanvas.width = w; tempCanvas.height = h;
    const tempCtx = tempCanvas.getContext('2d'); tempCtx.putImageData(img, 0, 0);
    const smallW = Math.floor(w / params.pixel); const smallH = Math.floor(h / params.pixel);
    const smallCanvas = document.createElement('canvas'); smallCanvas.width = smallW; smallCanvas.height = smallH;
    const smallCtx = smallCanvas.getContext('2d');
    smallCtx.drawImage(tempCanvas, 0, 0, w, h, 0, 0, smallW, smallH);
    
    ctxRef.clearRect(0, 0, w, h);
    ctxRef.imageSmoothingEnabled = false;
    ctxRef.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
    const pixelImg = ctxRef.getImageData(0, 0, w, h);
    for (let i = 0; i < d.length; i++) d[i] = pixelImg.data[i];
  }
}

// レンダリングループ
function loop() {
  frameCount++;
  
  if (currentMode === 'camera') {
    ctx.drawImage(v, 0, 0, c.width, c.height);
  } else if (currentMode === 'image') {
    ctx.drawImage(uploadedImg, 0, 0, c.width, c.height);
  } else if (currentMode === 'video' && uploadedVideo) {
    ctx.drawImage(uploadedVideo, 0, 0, c.width, c.height);
  }

  if (document.getElementById('mirror').checked) {
    ctx.scale(-1, 1);
    ctx.drawImage(c, 0, 0, -c.width, c.height);
    ctx.scale(-1, 1);
  }

  let img = ctx.getImageData(0, 0, c.width, c.height);
  applyEffects(img, c.width, c.height, ctx);
  
  const params = getEffectParams();
  applyDistortion(img, c.width, c.height, ctx, params.distTypes, params);

  animationId = requestAnimationFrame(loop);
}

// 静止画保存
document.getElementById('save').onclick = () => {
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'glitchlab-' + Date.now() + '.png';
  a.click();
};

// 動画インポート時専用のフレーム処理 (GIFレンダラー経由)
document.getElementById('saveVideoBtn').onclick = async () => {
  if (!uploadedVideo) return;
  document.getElementById('status').textContent = '動画処理中...';
  document.getElementById('saveVideoBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';

  try {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = uploadedVideo.videoWidth;
    tempCanvas.height = uploadedVideo.videoHeight;
    const tempCtx = tempCanvas.getContext('2d');

    uploadedVideo.currentTime = 0;
    const frames = [];
    const fpsRate = 30;
    const totalFrames = Math.ceil(uploadedVideo.duration * fpsRate);

    const processFrame = async (frameNum) => {
      if (frameNum >= totalFrames) {
        const gif = new GIF({ workers: 2, quality: 10, width: tempCanvas.width, height: tempCanvas.height });
        for (let i = 0; i < frames.length; i++) {
          const img = new Image();
          await new Promise((res) => {
            img.onload = () => { gif.addFrame(img, { delay: 1000 / fpsRate }); res(); };
            img.src = frames[i];
          });
        }
        gif.render();
        gif.on('finished', function(blob) {
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = 'glitchlab-video-' + Date.now() + '.mp4'; a.click();
          document.getElementById('progress').style.display = 'none';
          document.getElementById('status').textContent = '動画保存完了';
          document.getElementById('saveVideoBtn').disabled = false;
        });
        return;
      }

      document.getElementById('progress').textContent = `${Math.round((frameNum / totalFrames) * 100)}%`;
      uploadedVideo.currentTime = frameNum / fpsRate;
      await new Promise(r => setTimeout(r, 60));

      tempCtx.drawImage(uploadedVideo, 0, 0);
      let imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
      applyEffects(imgData, tempCanvas.width, tempCanvas.height, tempCtx);
      tempCtx.putImageData(imgData, 0, 0);

      frames.push(tempCanvas.toDataURL('image/jpeg', 0.8));
      processFrame(frameNum + 1);
    };
    processFrame(0);
  } catch (e) {
    document.getElementById('status').textContent = 'エラー: ' + e.message;
    document.getElementById('saveVideoBtn').disabled = false;
    document.getElementById('progress').style.display = 'none';
  }
};
</script>
