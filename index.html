<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AETHER GLITCH LAB</title>
<style>
:root {
  --bg-base: #0a0a0f;
  --bg-panel: rgba(16, 16, 24, 0.85);
  --border-color: rgba(0, 255, 170, 0.2);
  --accent-green: #00ffaa;
  --accent-purple: #bd00ff;
  --text-main: #f0f0f5;
  --text-muted: #8a8a9e;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-base); color: var(--text-main); -webkit-user-select: none; user-select: none; }
#container { display: flex; width: 100%; height: 100vh; flex-direction: column; position: relative; }

/* ヘッダー・ステータスバー */
.top-header {
  position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; background: linear-gradient(to bottom, rgba(10,10,15,0.8), rgba(10,10,15,0)); z-index: 60; pointer-events: none;
}
.brand { font-size: 13px; font-weight: 800; letter-spacing: 2px; color: var(--text-main); text-shadow: 0 0 8px rgba(240,240,245,0.5); }
.status-group { display: flex; gap: 10px; font-size: 11px; font-family: monospace; }
#fps { color: var(--accent-green); font-weight: bold; }
#status { color: #ff3b30; font-weight: bold; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* メインキャンバスエリア */
.viewport { flex: 1; width: 100%; height: 100%; position: relative; background: #000; overflow: hidden; }
#canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
video, img, input[type="file"] { display: none; }

/* タブコントロール */
.tab-navigator {
  display: flex; background: rgba(15, 15, 25, 0.95); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 30px; margin: 10px 16px 5px 16px; padding: 4px; z-index: 110; backdrop-filter: blur(10px);
}
.tab-trigger {
  flex: 1; padding: 10px; background: none; border: none; color: var(--text-muted); font-size: 12px; font-weight: 600;
  border-radius: 25px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
}
.tab-trigger.active { color: #000; background: var(--accent-green); font-weight: 700; box-shadow: 0 2px 10px rgba(0,255,170,0.4); }

/* コントロールUIパネル */
#ui-panel {
  background: var(--bg-panel); border-top: 1px solid var(--border-color); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 16px; max-height: 45vh; overflow-y: auto; z-index: 100; border-radius: 20px 20px 0 0;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.7); margin-top: auto;
}

/* アクションボタンのグリッド */
.control-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
button.action-btn {
  padding: 14px; background: rgba(255, 255, 255, 0.03); color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; transition: all 0.2s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
button.action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: var(--accent-green); }
button.action-btn:active:not(:disabled) { transform: scale(0.96); }
button.action-btn:disabled { opacity: 0.2; cursor: not-allowed; }

/* 特殊ボタンカラー */
.btn-prime { background: linear-gradient(135deg, #0055ff, #0033aa) !important; border: none !important; }
.btn-save { background: linear-gradient(135deg, #00aa55, #007733) !important; border: none !important; }
#recordBtn.recording { background: linear-gradient(135deg, #ff0055, #aa0033) !important; animation: blinker 1s infinite; border: none !important; }
@keyframes blinker { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* セクション設定 */
.panel-section { margin-bottom: 18px; background: rgba(255,255,255,0.01); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02); }
.panel-section h3 { font-size: 11px; font-weight: 700; color: var(--accent-green); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.panel-section h3::before { content: ''; display: inline-block; width: 3px; height: 11px; background: var(--accent-green); border-radius: 2px; }

/* スライダー群 */
.setting-row { margin-bottom: 12px; }
.setting-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.setting-info .val { color: var(--text-main); font-family: monospace; font-weight: bold; }

input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text-main); box-shadow: 0 0 8px rgba(255,255,255,0.5); cursor: pointer; transition: transform 0.1s; }
input
