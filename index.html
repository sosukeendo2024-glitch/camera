<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GlitchLab Pro - MV Evolution</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; -webkit-user-select: none; user-select: none; }
body { font-family: 'Courier New', Courier, system-ui, -apple-system, sans-serif; color: #fff; }
#container { display: flex; width: 100%; height: 100vh; flex-direction: column; }

/* タブバー */
.tab-bar { display: flex; background: #111; border-bottom: 2px solid #222; z-index: 100; }
.tab-btn { flex: 1; padding: 14px; background: none; border: none; color: #888; font-size: 13px; font-weight: bold; border-bottom: 3px solid transparent; transition: all 0.3s; }
.tab-btn.active { color: #00ffcc; background: #1a1a1a; border-bottom: 3px solid #00ffcc; }

/* メイン表示エリア */
.view-area { flex: 1; position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
#canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
video, img, input[type="file"] { display: none; }

/* ステータス情報 */
.info-overlay { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 60; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
#fps { color: #0f0; font-weight: bold; }
#status { color: #ff00ff; margin-left: 8px; }

/* 操作パネル */
#ui { background: #111; padding: 16px; z-index: 100; border-top: 2px solid #222; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
.action-zone { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 12px; }
button { padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px; }
button:hover:not(:disabled) { background: #2a2a2a; border-color: #00ffcc; box-shadow: 0 0 8px rgba(0,255,204,0.3); }
button:active:not(:disabled) { transform: scale(0.97); }
button:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-primary { background: #0066ff; border-color: #0088ff; }
.btn-success { background: #00aa55; border-color: #00cc66; }
.btn-danger { background: #cc1133; border-color: #ff2244; }
#recordBtn.recording { background: #ff0055; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* 詳細設定アコーディオン */
.accordion-header { background: #1a1a1a; padding: 10px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #ccc; border: 1px solid #222; }
.accordion-header:hover { background: #222; color: #00ffcc;}
.accordion-content { max-height: 0; overflow-y: auto; transition: max-height 0.3s ease-out; background: #151515; padding: 0 10px; }
.accordion-content.open { max-height: 250px; padding: 10px; border: 1px solid #222; border-top: none; margin-bottom: 10px; }

.section h3 { font-size: 11px; color: #00ffcc; margin: 10px 0 6px 0; letter-spacing: 1px; border-left: 3px solid #00ffcc; padding-left: 6px; }
.param-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 11px; }
.param-value { color: #00ffcc; font-weight: bold; min-width: 40px; text-align: right; }

input[type="range"] { width: 100%; height: 4px; background: #333; border-radius: 2px; -webkit-appearance: none; appearance: none; margin: 4px 0 8px 0; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00ffcc; cursor: pointer; }
.checkbox-item { display: flex; align-items: center; font-size: 11px; margin: 6px 0; }
.checkbox-item input { margin-right: 6px; }
select { width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 12px; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="container">
  <div class="tab-bar">
    <button class="tab-btn active" id="tabCamera">📷 リアルタイムカメラ</button>
    <button class="tab-btn" id="tabEditor">🎞️ 画像・動画編集</button>
  </div>

  <div class="view-area">
    <div class="info-overlay">
      <span id="fps">FPS: 0</span><span id="status">準備完了</span>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <img id="uploadedImage">
  <input type="file" id="uploadInput" accept="image/*,video/*">

  <div id="ui">
    <div id="cameraActions" class="action-zone">
      <button id="startCamBtn" class="btn-primary">▶ カメラ起動</button>
      <button id="toggleCamBtn" disabled>🔄 反転</button>
      <button id="recordBtn" class="btn-danger" disabled>🔴 録画スタート</button>
    </div>

    <div id="editorActions" class="action-zone" style="display: none;">
      <button id="uploadBtn" class="btn-primary">📤 ファイルを選択</button>
      <button id="saveImgBtn" class="btn-success" disabled>💾 画像を保存</button>
      <button id="saveVidBtn" class="btn-success" disabled>🎥 加工動画を保存</button>
    </div>

    <div class="accordion-header" id="toggleSettings">
      <span>⚙️ MV風エフェクト調整・詳細設定</span>
      <span id="arrow">▼</span>
    </div>
    
    <div class="accordion-content" id="settingsPanel">
      <div class="section">
        <h3>🎬 クローバー・MV専用バグ</h3>
        <div class="param-row">
          <label>ブロック・データシャffle（画像2,3,4枚目風）</label>
          <span class="param-value" id="mvBlockVal">0</span>
        </div>
        <input id="mvBlock" type="range" min="0" max="50" value="0">

        <div class="param-row">
          <label>ラジアルワープ（画像5枚目の吸い込み風）</label>
          <span class="param-value" id="mvRadialVal">0</span>
        </div>
        <input id="mvRadial" type="range" min="0" max="40" value="0">
      </div>

      <div class="section">
        <h3>📼 平成レトロ VHS効果</h3>
        <div class="checkbox-item">
          <input type="checkbox" id="vhsTimestamp" checked> VHS日付スタンプを表示
        </div>
        <div class="param-row"><label>トラッキング横ノイズ歪み</label><span class="param-value" id="vhsNoiseVal">20</span></div>
        <input id="vhsNoise" type="range" min="0" max="100" value="20">
        <div class="param-row"><label>画質のにじみ（エモボケ）</label><span class="param-value" id="vhsBlurVal">1.0</span></div>
        <input id="vhsBlur" type="range" min="1.0" max="4.0" step="0.5" value="1.0">
      </div>

      <div class="section">
        <h3>⚡ 基本グリッチ・カラー</h3>
        <div class="param-row"><label>RGBズレ（色収差）</label><span class="param-value" id="rgbVal">5</span></div>
        <input id="rgb" type="range" min="0" max="30" value="5">
        <div class="param-row"><label>画面の波打ち</label><span class="param-value" id="waveVal">0</span></div>
        <input id="wave" type="range" min="0" max="50" value="0">
        <div class="param-row"><label>彩度 (色の強さ)</label><span class="param-value" id="saturationVal">100</span></div>
        <input id="saturation" type="range" min="0" max="200" value="100">
        <div class="checkbox-item"><input type="checkbox" id="invert"> 色反転</div>
      </div>
      
      <button id="resetBtn" style="width:100%; padding:6px; font-size:11px; background:#333;">全エフェクトをクリア</button>
    </div>
  </div>
</div>

<script>
const v = document.getElementById('video');
const c = document.getElementById('canvas');
const ctx = c.getContext('2d');
const uploadedImg = document.getElementById('uploadedImage');
const uploadInput = document.getElementById('uploadInput');

let currentTab = 'camera', currentMode = 'none', animationId = null, mediaStream = null;
let isRecording = false, mediaRecorder = null, recordedChunks = [], useFrontCamera = true, uploadedVideo = null;

document.getElementById('tabCamera').onclick = () => switchTab('camera');
document.getElementById('tabEditor').onclick = () => switchTab('editor');

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('cameraActions').style.display = 'none';
  document.getElementById('editorActions').style.display = 'none';
  stopAllStreams();
  ctx.clearRect(0, 0, c.width, c.height);

  if(tab === 'camera') {
    document.getElementById('tabCamera').classList.add('active');
    document.getElementById('cameraActions').style.display = 'grid';
    document.getElementById('status').textContent = 'カメラ待機中';
  } else {
    document.getElementById('tabEditor').classList.add('active');
    document.getElementById('editorActions').style.display = 'grid';
    document.getElementById('status').textContent = 'ファイル未選択';
  }
}

document.getElementById('toggleSettings').onclick = () => {
  const panel = document.getElementById('settingsPanel');
  const arrow = document.getElementById('arrow');
  panel.classList.toggle('open');
  arrow.textContent = panel.classList.contains('open') ? '▲' : '▼';
};

function resizeCanvas() { c.width = window.innerWidth; c.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

let fps = 0, lastTime = Date.now(), frameCount = 0;
setInterval(() => {
  const now = Date.now();
  fps = Math.round(frameCount * 1000 / (now - lastTime));
  document.getElementById('fps').textContent = `FPS: ${fps}`;
  frameCount = 0; lastTime = now;
}, 1000);

['mvBlock', 'mvRadial', 'vhsNoise', 'vhsBlur', 'rgb', 'wave', 'saturation'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(id + 'Val').textContent = parseFloat(e.target.value).toFixed(id === 'vhsBlur' ? 1 : 0);
  });
});

document.getElementById('resetBtn').onclick = () => {
  ['mvBlock', 'mvRadial', 'wave', 'vhsNoise'].forEach(id => { document.getElementById(id).value = 0; document.getElementById(id+'Val').textContent='0'; });
  document.getElementById('vhsBlur').value = 1.0; document.getElementById('vhsBlurVal').textContent = '1.0';
  document.getElementById('rgb').value = 5; document.getElementById('rgbVal').textContent = '5';
  document.getElementById('saturation').value = 100; document.getElementById('saturationVal').textContent = '100';
  document.getElementById('invert').checked = false; document.getElementById('vhsTimestamp').checked = true;
};

document.getElementById('startCamBtn').onclick = async () => {
  try {
    stopAllStreams();
    document.getElementById('status').textContent = 'カメラ起動中...';
    mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFrontCamera ? 'user' : 'environment', width: 1280, height: 720 }, audio: false });
    v.srcObject = mediaStream; await v.play();
    currentMode = 'camera'; document.getElementById('status').textContent = 'LIVE';
    document.getElementById('toggleCamBtn').disabled = false; document.getElementById('recordBtn').disabled = false;
    loop();
  } catch(e) { document.getElementById('status').textContent = 'エラー: ' + e.message; }
};

document.getElementById('toggleCamBtn').onclick = () => { useFrontCamera = !useFrontCamera; document.getElementById('startCamBtn').click(); };

document.getElementById('uploadBtn').onclick = () => uploadInput.click();
uploadInput.onchange = (e) => {
  const file = e.target.files[0]; if (!file) return;
  document.getElementById('status').textContent = '読み込み中...';
  stopAllStreams();

  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedImg.onload = () => { currentMode = 'image'; document.getElementById('status').textContent = '画像ロード完了'; document.getElementById('saveImgBtn').disabled = false; document.getElementById('saveVidBtn').disabled = true; loop(); };
      uploadedImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  } else if (file.type.startsWith('video/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedVideo = document.createElement('video');
      uploadedVideo.autoplay = true; uploadedVideo.loop = true; uploadedVideo.playsInline = true; uploadedVideo.muted = true;
      uploadedVideo.onloadedmetadata = () => { currentMode = 'video'; document.getElementById('status').textContent = '動画ロード完了'; document.getElementById('saveImgBtn').disabled = true; document.getElementById('saveVidBtn').disabled = false; uploadedVideo.play(); loop(); };
      uploadedVideo.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
};

function stopAllStreams() {
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (uploadedVideo) { uploadedVideo.pause(); uploadedVideo = null; }
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  if (isRecording) { try { mediaRecorder.stop(); } catch(e) {} isRecording = false; }
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('recordBtn').textContent = '🔴 録画スタート';
}

function startRecording() {
  recordedChunks = []; const stream = c.captureStream(30);
  let options = { mimeType: 'video/mp4; codecs=avc1.42E01E' };
  if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/quicktime' };
  if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: '' };

  mediaRecorder = new MediaRecorder(stream, options);
  mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mv-glitch-' + Date.now() + (mediaRecorder.mimeType.includes('quicktime') ? '.mov' : '.mp4');
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    document.getElementById('status').textContent = '保存完了';
  };
  mediaRecorder.start(1000); isRecording = true;
  document.getElementById('recordBtn').classList.add('recording'); document.getElementById('recordBtn').textContent = '⏹️ 録画を停止';
}

document.getElementById('recordBtn').onclick = () => { if (!isRecording) startRecording(); else mediaRecorder.stop(); };
document.getElementById('saveImgBtn').onclick = () => { const a = document.createElement('a'); a.href = c.toDataURL('image/png'); a.download = 'mv-snap-' + Date.now() + '.png'; a.click(); };

// --- コア描画エンジンループ ---
function loop() {
  frameCount++;
  const blurFactor = parseFloat(document.getElementById('vhsBlur').value);
  
  // 1. 映像をベースに描画
  if (blurFactor > 1.0) {
    const sw = c.width / blurFactor, sh = c.height / blurFactor;
    const tCanvas = document.createElement('canvas'); tCanvas.width = sw; tCanvas.height = sh;
    const tCtx = tCanvas.getContext('2d');
    if (currentMode === 'camera') tCtx.drawImage(v, 0, 0, sw, sh);
    else if (currentMode === 'video') tCtx.drawImage(uploadedVideo, 0, 0, sw, sh);
    else if (currentMode === 'image') tCtx.drawImage(uploadedImg, 0, 0, sw, sh);
    ctx.clearRect(0,0,c.width,c.height); ctx.imageSmoothingEnabled = true;
    ctx.drawImage(tCanvas, 0, 0, sw, sh, 0, 0, c.width, c.height);
  } else {
    if (currentMode === 'camera') ctx.drawImage(v, 0, 0, c.width, c.height);
    else if (currentMode === 'video') ctx.drawImage(uploadedVideo, 0, 0, c.width, c.height);
    else if (currentMode === 'image') ctx.drawImage(uploadedImg, 0, 0, c.width, c.height);
  }

  // 2. MV風「ブロック・データシャッフルグリッチ」の演算（超軽量高速処理）
  const mvBlock = +document.getElementById('mvBlock').value;
  if (mvBlock > 0 && currentMode !== 'none') {
    const blockSize = 64; // MVに近い綺麗な正方形サイズ
    const numGlitchBlocks = Math.floor(mvBlock * 1.5);
    for (let i = 0; i < numGlitchBlocks; i++) {
      // 画面上のランダムな正方形の座標
      const bx = Math.floor(Math.random() * (c.width / blockSize)) * blockSize;
      const by = Math.floor(Math.random() * (c.height / blockSize)) * blockSize;
      // ズラす量と方向
      const dispX = (Math.random() - 0.5) * mvBlock * 12;
      const dispY = (Math.random() - 0.5) * mvBlock * 2;
      
      // 切り取って別の場所に重ね書き（バグパーツ化）
      ctx.drawImage(c, bx, by, blockSize, blockSize, bx + dispX, by + dispY, blockSize, blockSize);
    }
  }

  // 3. MV風「ハイパースペース・ラジアルワープ」（画像5枚目の放射状ブラー引き延ばし）
  const mvRadial = +document.getElementById('mvRadial').value;
  if (mvRadial > 0 && currentMode !== 'none') {
    ctx.save();
    ctx.globalAlpha = 0.25; // 重ね合わせの透明度
    const steps = 6;
    const scaleFactor = 1.0 + (mvRadial / 200);
    // 中心を軸に何重にも拡大コピーを重ねることであの線の引き延ばしを再現
    for (let i = 0; i < steps; i++) {
      ctx.translate(c.width / 2, c.height / 2);
      ctx.scale(scaleFactor, scaleFactor);
      ctx.translate(-c.width / 2, -c.height / 2);
      ctx.drawImage(c, 0, 0);
    }
    ctx.restore();
  }

  // 4. ピクセル・カラーフィルター適用
  if (currentMode !== 'none') {
    let img = ctx.getImageData(0, 0, c.width, c.height);
    applyCoreFilters(img.data, c.width, c.height);
    ctx.putImageData(img, 0, 0);
  }

  // 5. 波打ち & VHSトラッキングノイズ（アナログバグ）
  const waveAmt = +document.getElementById('wave').value;
  const vhsNoiseAmt = +document.getElementById('vhsNoise').value;
  if (waveAmt > 0 || vhsNoiseAmt > 0) {
    const time = performance.now();
    const noiseY = (time / 4) % c.height;
    for (let y = 0; y < c.height; y += 4) {
      let dx = 0;
      if (waveAmt > 0) dx += Math.sin((y + time / 8) / 15) * waveAmt;
      if (vhsNoiseAmt > 0) {
        if (y > c.height - 35 && Math.random() > 0.5) dx += (Math.random() - 0.5) * vhsNoiseAmt * 0.8;
        if (Math.abs(y - noiseY) < 12 && Math.random() > 0.3) dx += (Math.random() - 0.5) * vhsNoiseAmt * 0.5;
      }
      if (dx !== 0) ctx.drawImage(c, 0, y, c.width, 4, dx, y, c.width, 4);
    }
  }

  // 6. VHS日付タイムスタンプ
  if (document.getElementById('vhsTimestamp').checked && currentMode !== 'none') {
    ctx.save();
    ctx.font = 'bold 22px "Courier New", monospace';
    ctx.fillStyle = 'rgba(235, 100, 20, 0.85)';
    ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
    ctx.fillText(isRecording ? '● REC' : '  PLAY', 30, 45);
    ctx.fillStyle = 'rgba(230, 230, 230, 0.85)';
    ctx.fillText('AM 12:00', 30, c.height - 65);
    ctx.fillText('JAN. 1 1998', 30, c.height - 35);
    ctx.restore();
  }

  animationId = requestAnimationFrame(loop);
}

function applyCoreFilters(d, w, h) {
  const rgb = +document.getElementById('rgb').value;
  const sat = +document.getElementById('saturation').value / 100;
  const invert = document.getElementById('invert').checked;

  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];
    let gray = 0.299 * r + 0.587 * g + 0.114 * b;
    r = gray + (r - gray) * sat; g = gray + (g - gray) * sat; b = gray + (b - gray) * sat;
    if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
    d[i] = Math.max(0, Math.min(255, r)); d[i+1] = Math.max(0, Math.min(255, g)); d[i+2] = Math.max(0, Math.min(255, b));
  }

  // 高速RGBシフト
  if (rgb > 0) {
    for (let y = 0; y < h; y += 2) {
      let shift = Math.floor(Math.sin(y / 8) * rgb);
      for (let x = 0; x < w - Math.abs(shift) - 1; x++) {
        let p = (y * w + x) * 4; let q = (y * w + x + shift) * 4;
        if (q < d.length - 4) { d[p] = d[q]; }
      }
    }
  }
}
</script>
</body>
</html>
