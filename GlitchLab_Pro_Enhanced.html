<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GlitchLab Pro</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  -webkit-user-select: none;
  user-select: none;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  color: #fff;
}

#container {
  display: flex;
  width: 100%;
  height: 100vh;
  flex-direction: column;
}

#canvas {
  flex: 1;
  width: 100%;
  height: 100%;
  display: block;
  background: #000;
  object-fit: cover;
}

video {
  display: none;
}

#uploadInput {
  display: none;
}

.top-controls {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: rgba(0, 0, 0, 0.8);
  z-index: 50;
  font-size: 12px;
  border-bottom: 1px solid #333;
}

#fps {
  color: #0f0;
  font-weight: 600;
}

#mode {
  color: #0ff;
  font-size: 11px;
  background: #1a3a3a;
  padding: 4px 8px;
  border-radius: 4px;
}

#progress {
  color: #ff9900;
  font-size: 10px;
  display: none;
}

#ui {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0, 0, 0, 0.95);
  padding: 12px;
  max-height: 50vh;
  overflow-y: auto;
  z-index: 100;
  border-top: 1px solid #333;
}

#ui h2 {
  font-size: 16px;
  margin-bottom: 10px;
  text-align: center;
  color: #0f0;
}

.section {
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #333;
}

.section h3 {
  font-size: 11px;
  text-transform: uppercase;
  color: #0f0;
  margin: 6px 0;
  letter-spacing: 1px;
}

.button-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}

button {
  padding: 8px;
  background: #333;
  color: #fff;
  border: 1px solid #555;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  text-transform: uppercase;
}

button:hover:not(:disabled) {
  background: #444;
  border-color: #0f0;
}

button:active:not(:disabled) {
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#recordBtn {
  background: #c41e3a;
  grid-column: 1 / 3;
}

#recordBtn.recording {
  background: #00ff00;
  color: #000;
  animation: blink 0.5s infinite;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0.7; }
}

#cameraToggle {
  background: #0066ff;
}

#uploadBtn {
  background: #ff6600;
  grid-column: 1 / 3;
}

#saveVideoBtn {
  background: #00aa00;
  grid-column: 1 / 3;
}

select {
  width: 100%;
  padding: 6px;
  background: #222;
  color: #fff;
  border: 1px solid #555;
  border-radius: 6px;
  margin: 4px 0;
  font-size: 11px;
  cursor: pointer;
}

.param-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 4px 0;
  font-size: 11px;
}

.param-row label {
  flex: 1;
}

.param-value {
  color: #0f0;
  min-width: 35px;
  text-align: right;
  font-weight: 600;
}

input[type="range"] {
  width: 100%;
  height: 3px;
  margin: 3px 0;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  background: #555;
  border-radius: 5px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #0f0;
  cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #0f0;
  cursor: pointer;
  border: none;
}

input[type="checkbox"] {
  margin-right: 6px;
  cursor: pointer;
  width: 14px;
  height: 14px;
}

#status {
  font-size: 10px;
  color: #0f0;
  text-align: center;
  padding: 4px;
  background: #1a1a1a;
  border-radius: 4px;
  margin-bottom: 6px;
  min-height: 16px;
}

.checkbox-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.checkbox-item {
  display: flex;
  align-items: center;
  font-size: 10px;
}

.checkbox-item input {
  width: 12px;
  height: 12px;
  margin-right: 4px;
}

@media (max-width: 600px) {
  .button-group {
    grid-template-columns: 1fr;
  }

  #recordBtn, #uploadBtn, #saveVideoBtn {
    grid-column: auto;
  }

  #ui {
    max-height: 55vh;
  }

  .top-controls {
    font-size: 10px;
  }

  body {
    font-size: 12px;
  }
}

::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: #1a1a1a;
}

::-webkit-scrollbar-thumb {
  background: #0f0;
  border-radius: 3px;
}
</style>
</head>
<body>

<div id="container">
  <div class="top-controls">
    <div id="fps">FPS: 0</div>
    <div id="mode">📷 カメラ</div>
    <div id="progress"></div>
    <div id="status">準備完了</div>
  </div>

  <canvas id="canvas"></canvas>
  <video id="video" autoplay playsinline></video>
  <img id="uploadedImage" style="display: none;">
  <input type="file" id="uploadInput" accept="image/*,video/*">

  <div id="ui">
    <h2>🎨 GlitchLab Pro</h2>

    <div class="section">
      <h3>モード</h3>
      <div class="button-group">
        <button id="start">📷 開始</button>
        <button id="stop" disabled>⏹ 停止</button>
        <button id="uploadBtn">📤 ファイル</button>
      </div>
      <div class="button-group">
        <button id="cameraToggle" disabled>🔄 カメラ切替</button>
        <button id="recordBtn" disabled>🔴 録画</button>
      </div>
      <div class="button-group">
        <button id="save" disabled>💾 画像保存</button>
        <button id="saveVideoBtn" disabled>🎥 MP4保存</button>
      </div>
      <button id="reset" style="width: 100%;">↺ リセット</button>
    </div>

    <div class="section">
      <h3>プリセット</h3>
      <select id="preset">
        <option value="">-- プリセット選択 --</option>
        <option value="cyberpunk">🌃 Cyberpunk</option>
        <option value="vhs">📼 VHS</option>
        <option value="matrix">🟢 Matrix</option>
        <option value="glitch">⚡ Glitch</option>
        <option value="retro">🎮 Retro</option>
        <option value="dream">✨ Dream</option>
      </select>
    </div>

    <div class="section">
      <h3>ノイズタイプ</h3>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="noiseType1" checked> 細かい
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="noiseType2"> 粗い
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="noiseType3"> パルス
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="noiseType4"> グラデ
        </div>
      </div>

      <div class="param-row">
        <label>ノイズ量</label>
        <span class="param-value" id="noiseVal">40</span>
      </div>
      <input id="noise" type="range" min="0" max="150" value="40">

      <div class="param-row">
        <label>ノイズ細かさ</label>
        <span class="param-value" id="noiseSizeVal">1</span>
      </div>
      <input id="noiseSize" type="range" min="0.5" max="10" step="0.5" value="1">
    </div>

    <div class="section">
      <h3>色効果</h3>
      <div class="param-row">
        <label>RGBシフト</label>
        <span class="param-value" id="rgbVal">8</span>
      </div>
      <input id="rgb" type="range" min="0" max="30" value="8">

      <div class="param-row">
        <label>走査線</label>
        <span class="param-value" id="scanVal">40</span>
      </div>
      <input id="scan" type="range" min="0" max="100" value="40">

      <div class="param-row">
        <label>彩度</label>
        <span class="param-value" id="saturationVal">100</span>
      </div>
      <input id="saturation" type="range" min="0" max="200" value="100">

      <div class="param-row">
        <label>明るさ</label>
        <span class="param-value" id="brightnessVal">100</span>
      </div>
      <input id="brightness" type="range" min="0" max="200" value="100">
    </div>

    <div class="section">
      <h3>歪みタイプ</h3>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="distType1" checked> 波打ち
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="distType2"> 樽
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="distType3"> ピンク
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="distType4"> ツイスト
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="distType5"> レンズ
        </div>
      </div>

      <div class="param-row">
        <label>波打ち歪み</label>
        <span class="param-value" id="waveVal">10</span>
      </div>
      <input id="wave" type="range" min="0" max="50" value="10">

      <div class="param-row">
        <label>樽歪み</label>
        <span class="param-value" id="barrelVal">0</span>
      </div>
      <input id="barrel" type="range" min="0" max="50" value="0">

      <div class="param-row">
        <label>ピンクッション</label>
        <span class="param-value" id="pincushionVal">0</span>
      </div>
      <input id="pincushion" type="range" min="0" max="50" value="0">

      <div class="param-row">
        <label>ツイスト</label>
        <span class="param-value" id="twistVal">0</span>
      </div>
      <input id="twist" type="range" min="0" max="50" value="0">

      <div class="param-row">
        <label>色収差</label>
        <span class="param-value" id="abVal">5</span>
      </div>
      <input id="ab" type="range" min="0" max="20" value="5">

      <div class="param-row">
        <label>グリッチ量</label>
        <span class="param-value" id="glitchVal">8</span>
      </div>
      <input id="glitch" type="range" min="0" max="30" value="8">

      <div class="param-row">
        <label>モザイク</label>
        <span class="param-value" id="pixelVal">1</span>
      </div>
      <input id="pixel" type="range" min="1" max="40" value="1">
    </div>

    <div class="section">
      <h3>追加効果</h3>
      <div class="param-row">
        <label>ポスター化</label>
        <span class="param-value" id="posterVal">0</span>
      </div>
      <input id="poster" type="range" min="0" max="8" value="0">

      <div class="param-row">
        <label><input id="invert" type="checkbox"> 色反転</label>
      </div>
      <div class="param-row">
        <label><input id="mirror" type="checkbox"> 水平反転</label>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
const v = document.getElementById('video');
const c = document.getElementById('canvas');
const ctx = c.getContext('2d');
const uploadedImg = document.getElementById('uploadedImage');
const uploadInput = document.getElementById('uploadInput');
let animationId = null;
let mediaStream = null;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let useFrontCamera = true;
let currentMode = 'camera';
let uploadedVideo = null;
let uploadedVideoTime = 0;

function resizeCanvas() {
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let fps = 0, lastTime = Date.now(), frameCount = 0;
setInterval(() => {
  const now = Date.now();
  fps = Math.round(frameCount * 1000 / (now - lastTime));
  document.getElementById('fps').textContent = `FPS: ${fps}`;
  frameCount = 0;
  lastTime = now;
}, 1000);

['noise', 'noiseSize', 'rgb', 'scan', 'pixel', 'wave', 'barrel', 'pincushion', 'twist', 'ab', 'glitch', 'poster', 'saturation', 'brightness'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(id + 'Val').textContent = parseFloat(e.target.value).toFixed(1);
  });
});

const presets = {
  cyberpunk: { noise: 60, noiseSize: 1, rgb: 15, scan: 60, pixel: 2, wave: 15, barrel: 10, pincushion: 0, twist: 5, ab: 8, glitch: 15, poster: 0, saturation: 150, brightness: 110, invert: false, mirror: false },
  vhs: { noise: 80, noiseSize: 1.5, rgb: 8, scan: 80, pixel: 1, wave: 5, barrel: 0, pincushion: 0, twist: 0, ab: 3, glitch: 5, poster: 0, saturation: 80, brightness: 90, invert: false, mirror: false },
  matrix: { noise: 20, noiseSize: 0.5, rgb: 0, scan: 30, pixel: 1, wave: 0, barrel: 0, pincushion: 0, twist: 0, ab: 0, glitch: 0, poster: 0, saturation: 50, brightness: 100, invert: false, mirror: false },
  glitch: { noise: 100, noiseSize: 2, rgb: 20, scan: 50, pixel: 3, wave: 20, barrel: 5, pincushion: 5, twist: 8, ab: 10, glitch: 25, poster: 2, saturation: 120, brightness: 100, invert: false, mirror: false },
  retro: { noise: 40, noiseSize: 2, rgb: 5, scan: 40, pixel: 4, wave: 0, barrel: 2, pincushion: 0, twist: 0, ab: 2, glitch: 3, poster: 3, saturation: 100, brightness: 100, invert: false, mirror: false },
  dream: { noise: 30, noiseSize: 1, rgb: 10, scan: 20, pixel: 1, wave: 30, barrel: 15, pincushion: 10, twist: 3, ab: 8, glitch: 5, poster: 1, saturation: 130, brightness: 110, invert: false, mirror: false }
};

document.getElementById('preset').addEventListener('change', e => {
  if (e.target.value && presets[e.target.value]) {
    const p = presets[e.target.value];
    ['noise', 'noiseSize', 'rgb', 'scan', 'pixel', 'wave', 'barrel', 'pincushion', 'twist', 'ab', 'glitch', 'poster', 'saturation', 'brightness'].forEach(id => {
      document.getElementById(id).value = p[id];
      document.getElementById(id + 'Val').textContent = parseFloat(p[id]).toFixed(1);
    });
    document.getElementById('invert').checked = p.invert;
    document.getElementById('mirror').checked = p.mirror;
  }
});

document.getElementById('reset').onclick = () => {
  ['noise', 'rgb', 'scan', 'pixel', 'wave', 'barrel', 'pincushion', 'twist', 'ab', 'glitch', 'poster', 'saturation', 'brightness'].forEach(id => {
    const defaultVal = id === 'saturation' || id === 'brightness' ? 100 : id === 'pixel' ? 1 : 0;
    document.getElementById(id).value = defaultVal;
    document.getElementById(id + 'Val').textContent = defaultVal;
  });
  document.getElementById('noiseSize').value = 1;
  document.getElementById('noiseSizeVal').textContent = '1.0';
  document.getElementById('invert').checked = false;
  document.getElementById('mirror').checked = false;
  ['noiseType1', 'noiseType2', 'noiseType3', 'noiseType4'].forEach((id, i) => {
    document.getElementById(id).checked = (i === 0);
  });
  ['distType1', 'distType2', 'distType3', 'distType4', 'distType5'].forEach((id, i) => {
    document.getElementById(id).checked = (i === 0);
  });
};

document.getElementById('uploadBtn').onclick = () => uploadInput.click();

uploadInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('status').textContent = 'ファイル読込中...';

  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedImg.onload = () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (animationId) cancelAnimationFrame(animationId);
        
        currentMode = 'image';
        document.getElementById('mode').textContent = '🖼️ 画像';
        document.getElementById('start').disabled = true;
        document.getElementById('stop').disabled = false;
        document.getElementById('cameraToggle').disabled = true;
        document.getElementById('recordBtn').disabled = true;
        document.getElementById('saveVideoBtn').disabled = true;
        document.getElementById('status').textContent = '画像読込完了';
        
        loop();
      };
      uploadedImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  } else if (file.type.startsWith('video/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      if (animationId) cancelAnimationFrame(animationId);
      
      uploadedVideo = document.createElement('video');
      uploadedVideo.onloadedmetadata = () => {
        currentMode = 'video';
        document.getElementById('mode').textContent = '🎬 動画';
        document.getElementById('start').disabled = true;
        document.getElementById('stop').disabled = false;
        document.getElementById('cameraToggle').disabled = true;
        document.getElementById('recordBtn').disabled = true;
        document.getElementById('saveVideoBtn').disabled = false;
        document.getElementById('status').textContent = '動画読込完了';
        
        uploadedVideoTime = 0;
        uploadedVideo.play();
        loop();
      };
      uploadedVideo.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  
  uploadInput.value = '';
});

document.getElementById('start').onclick = async () => {
  try {
    document.getElementById('status').textContent = 'カメラにアクセス中...';
    const s = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: useFrontCamera ? 'user' : 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    mediaStream = s;
    v.srcObject = s;
    await v.play();
    currentMode = 'camera';
    document.getElementById('mode').textContent = '📷 カメラ';
    document.getElementById('start').disabled = true;
    document.getElementById('stop').disabled = false;
    document.getElementById('save').disabled = false;
    document.getElementById('recordBtn').disabled = false;
    document.getElementById('cameraToggle').disabled = false;
    document.getElementById('saveVideoBtn').disabled = true;
    document.getElementById('status').textContent = '実行中';

    const options = { mimeType: 'video/webm;codecs=vp9' };
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
      options.mimeType = 'video/webm';
    }
    mediaRecorder = new MediaRecorder(mediaStream, options);
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const video = document.createElement('video');
      video.onloadedmetadata = async () => {
        document.getElementById('progress').style.display = 'block';
        document.getElementById('status').textContent = 'MP4変換中...';
        
        const mp4Blob = await convertWebMToMP4(blob, video.duration);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(mp4Blob);
        a.download = 'glitchlab-' + Date.now() + '.mp4';
        a.click();
        
        document.getElementById('progress').style.display = 'none';
        document.getElementById('status').textContent = '保存完了';
      };
      video.src = url;
      recordedChunks = [];
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('recordBtn').textContent = '🔴 録画';
      isRecording = false;
    };

    loop();
  } catch (e) {
    document.getElementById('status').textContent = 'エラー: ' + e.message;
    console.error(e);
  }
};

document.getElementById('stop').onclick = () => {
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  if (uploadedVideo) {
    uploadedVideo.pause();
    uploadedVideo = null;
  }
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
  }
  document.getElementById('start').disabled = false;
  document.getElementById('stop').disabled = true;
  document.getElementById('save').disabled = true;
  document.getElementById('recordBtn').disabled = true;
  document.getElementById('cameraToggle').disabled = true;
  document.getElementById('saveVideoBtn').disabled = true;
  document.getElementById('mode').textContent = '📷 カメラ';
  document.getElementById('status').textContent = '停止中';
};

document.getElementById('cameraToggle').onclick = async () => {
  useFrontCamera = !useFrontCamera;
  
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
  }
  if (animationId) {
    cancelAnimationFrame(animationId);
  }
  
  document.getElementById('start').onclick();
};

document.getElementById('recordBtn').onclick = () => {
  if (!isRecording) {
    recordedChunks = [];
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordBtn').textContent = '⏹ 停止';
  } else {
    mediaRecorder.stop();
  }
};

document.getElementById('saveVideoBtn').onclick = async () => {
  if (!uploadedVideo) return;

  document.getElementById('status').textContent = '動画処理中...';
  document.getElementById('saveVideoBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';

  try {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = uploadedVideo.videoWidth;
    tempCanvas.height = uploadedVideo.videoHeight;
    const tempCtx = tempCanvas.getContext('2d');

    uploadedVideo.currentTime = 0;
    const frames = [];
    const fps = 30;
    const duration = uploadedVideo.duration;
    const totalFrames = Math.ceil(duration * fps);

    const processFrame = async (frameNum) => {
      if (frameNum >= totalFrames) {
        await convertFramesToMP4(frames, tempCanvas.width, tempCanvas.height, fps);
        document.getElementById('progress').style.display = 'none';
        document.getElementById('status').textContent = '動画保存完了';
        document.getElementById('saveVideoBtn').disabled = false;
        return;
      }

      const progress = Math.round((frameNum / totalFrames) * 100);
      document.getElementById('progress').textContent = `${progress}%`;

      uploadedVideo.currentTime = frameNum / fps;
      await new Promise(r => setTimeout(r, 100));

      tempCtx.drawImage(uploadedVideo, 0, 0);
      let img = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
      applyEffects(img, tempCanvas.width, tempCanvas.height);
      tempCtx.putImageData(img, 0, 0);

      frames.push(tempCanvas.toDataURL('image/jpeg', 0.8));
      processFrame(frameNum + 1);
    };

    processFrame(0);
  } catch (e) {
    document.getElementById('status').textContent = 'エラー: ' + e.message;
    console.error(e);
    document.getElementById('saveVideoBtn').disabled = false;
    document.getElementById('progress').style.display = 'none';
  }
};

async function convertFramesToMP4(frames, width, height, fps) {
  const gif = new GIF({ workers: 2, quality: 10, width, height });
  
  for (let i = 0; i < frames.length; i++) {
    const img = new Image();
    await new Promise((resolve, reject) => {
      img.onload = () => {
        gif.addFrame(img, { delay: 1000 / fps });
        resolve();
      };
      img.onerror = reject;
      img.src = frames[i];
    });
  }

  gif.render();
  gif.on('finished', function(blob) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'glitchlab-video-' + Date.now() + '.mp4';
    a.click();
  });
}

function getEffectParams() {
  return {
    noise: +document.getElementById('noise').value,
    noiseSize: +document.getElementById('noiseSize').value,
    noiseTypes: [
      document.getElementById('noiseType1').checked,
      document.getElementById('noiseType2').checked,
      document.getElementById('noiseType3').checked,
      document.getElementById('noiseType4').checked
    ],
    rgb: +document.getElementById('rgb').value,
    scan: +document.getElementById('scan').value,
    pixel: +document.getElementById('pixel').value,
    wave: +document.getElementById('wave').value,
    barrel: +document.getElementById('barrel').value,
    pincushion: +document.getElementById('pincushion').value,
    twist: +document.getElementById('twist').value,
    distTypes: [
      document.getElementById('distType1').checked,
      document.getElementById('distType2').checked,
      document.getElementById('distType3').checked,
      document.getElementById('distType4').checked,
      document.getElementById('distType5').checked
    ],
    ab: +document.getElementById('ab').value,
    glitch: +document.getElementById('glitch').value,
    poster: +document.getElementById('poster').value,
    saturation: +document.getElementById('saturation').value / 100,
    brightness: +document.getElementById('brightness').value / 100,
    invert: document.getElementById('invert').checked,
    mirror: document.getElementById('mirror').checked
  };
}

function applyNoise(d, w, h, amount, size, types) {
  if (amount <= 0) return;
  
  const pixelSize = Math.max(1, Math.floor(size));
  
  for (let y = 0; y < h; y += pixelSize) {
    for (let x = 0; x < w; x += pixelSize) {
      let noiseValue = 0;
      
      if (types[0]) { // 細かいノイズ
        noiseValue += (Math.random() - 0.5) * amount * 0.5;
      }
      if (types[1]) { // 粗いノイズ
        noiseValue += (Math.random() - 0.5) * amount * Math.sin(x / 20) * Math.cos(y / 20);
      }
      if (types[2]) { // パルスノイズ
        noiseValue += (Math.random() > 0.8 ? (Math.random() - 0.5) * amount : 0);
      }
      if (types[3]) { // グラデーションノイズ
        noiseValue += ((Math.sin(x / 50) + Math.cos(y / 50)) / 2) * (Math.random() - 0.5) * amount;
      }
      
      for (let dy = 0; dy < pixelSize && y + dy < h; dy++) {
        for (let dx = 0; dx < pixelSize && x + dx < w; dx++) {
          const i = ((y + dy) * w + (x + dx)) * 4;
          d[i] = Math.max(0, Math.min(255, d[i] + noiseValue));
          d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + noiseValue));
          d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + noiseValue));
        }
      }
    }
  }
}

function applyDistortion(img, w, h, ctx, types, params) {
  let d = img.data;
  
  if (types[0] && params.wave > 0) { // 波打ち
    for (let y = 0; y < h; y += 2) {
      let dx = Math.sin((y + performance.now() / 20) / 20) * params.wave;
      ctx.drawImage(ctx.canvas, 0, y, w, 2, dx, y, w, 2);
    }
  }
  
  if (types[2] && params.pincushion > 0) { // ピンクッション
    const cx = w / 2, cy = h / 2;
    const r = Math.sqrt(cx * cx + cy * cy);
    const k = params.pincushion / 100;
    const newImg = new ImageData(w, h);
    const newD = newImg.data;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = x - cx, dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const newDist = dist / (1 + k * (dist / r));
        const nx = Math.round(cx + Math.cos(angle) * newDist);
        const ny = Math.round(cy + Math.sin(angle) * newDist);

        if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
          const idx = (y * w + x) * 4;
          const srcIdx = (ny * w + nx) * 4;
          newD[idx] = d[srcIdx];
          newD[idx + 1] = d[srcIdx + 1];
          newD[idx + 2] = d[srcIdx + 2];
          newD[idx + 3] = d[srcIdx + 3];
        }
      }
    }
    
    for (let i = 0; i < d.length; i++) {
      d[i] = newImg.data[i];
    }
  }
  
  if (types[3] && params.twist > 0) { // ツイスト
    const cx = w / 2, cy = h / 2;
    const newImg = new ImageData(w, h);
    const newD = newImg.data;
    const maxDist = Math.sqrt(cx * cx + cy * cy);

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = x - cx, dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const twistAmount = (1 - dist / maxDist) * params.twist * Math.PI / 180;
        const newAngle = angle + twistAmount;
        const nx = Math.round(cx + Math.cos(newAngle) * dist);
        const ny = Math.round(cy + Math.sin(newAngle) * dist);

        if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
          const idx = (y * w + x) * 4;
          const srcIdx = (ny * w + nx) * 4;
          newD[idx] = d[srcIdx];
          newD[idx + 1] = d[srcIdx + 1];
          newD[idx + 2] = d[srcIdx + 2];
          newD[idx + 3] = d[srcIdx + 3];
        }
      }
    }
    
    for (let i = 0; i < d.length; i++) {
      d[i] = newImg.data[i];
    }
  }
}

function applyEffects(img, w, h, ctxRef) {
  const params = getEffectParams();
  let d = img.data;

  // ノイズ
  applyNoise(d, w, h, params.noise, params.noiseSize, params.noiseTypes);

  // 色調整
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i + 1], b = d[i + 2];
    let gray = (r + g + b) / 3;
    r = gray + (r - gray) * params.saturation;
    g = gray + (g - gray) * params.saturation;
    b = gray + (b - gray) * params.saturation;
    d[i] = Math.max(0, Math.min(255, r * params.brightness));
    d[i + 1] = Math.max(0, Math.min(255, g * params.brightness));
    d[i + 2] = Math.max(0, Math.min(255, b * params.brightness));

    if (params.invert) {
      d[i] = 255 - d[i];
      d[i + 1] = 255 - d[i + 1];
      d[i + 2] = 255 - d[i + 2];
    }

    if (params.poster > 0) {
      const levels = Math.pow(2, 8 - params.poster);
      d[i] = Math.floor(d[i] / levels) * levels;
      d[i + 1] = Math.floor(d[i + 1] / levels) * levels;
      d[i + 2] = Math.floor(d[i + 2] / levels) * levels;
    }
  }

  // RGBシフト
  for (let y = 0; y < h; y++) {
    let shift = Math.floor(Math.sin(y / 15) * params.rgb);
    for (let x = 0; x < w - Math.abs(shift) - 1; x++) {
      let p = (y * w + x) * 4;
      let q = (y * w + x + shift) * 4;
      if (q < d.length - 4) {
        d[p] = d[q];
      }
    }
  }

  // 走査線
  if (params.scan > 0) {
    const scanAlpha = params.scan / 100;
    for (let y = 0; y < h; y += 4) {
      for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;
        d[idx] *= (1 - scanAlpha);
        d[idx + 1] *= (1 - scanAlpha);
        d[idx + 2] *= (1 - scanAlpha);
      }
    }
  }

  // モザイク
  if (params.pixel > 1) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = w;
    tempCanvas.height = h;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.putImageData(img, 0, 0);
    
    const smallW = Math.floor(w / params.pixel);
    const smallH = Math.floor(h / params.pixel);
    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = smallW;
    smallCanvas.height = smallH;
    const smallCtx = smallCanvas.getContext('2d');
    smallCtx.drawImage(tempCanvas, 0, 0, w, h, 0, 0, smallW, smallH);
    
    if (ctxRef) {
      ctxRef.clearRect(0, 0, w, h);
      ctxRef.imageSmoothingEnabled = false;
      ctxRef.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
      const pixelImg = ctxRef.getImageData(0, 0, w, h);
      for (let i = 0; i < d.length; i++) {
        d[i] = pixelImg.data[i];
      }
    }
  }
}

function loop() {
  frameCount++;
  ctx.drawImage(v, 0, 0, c.width, c.height);

  if (document.getElementById('mirror').checked) {
    ctx.scale(-1, 1);
    ctx.drawImage(c, 0, 0, -c.width, c.height);
    ctx.scale(-1, 1);
  }

  let img = ctx.getImageData(0, 0, c.width, c.height);
  applyEffects(img, c.width, c.height, ctx);
  ctx.putImageData(img, 0, 0);

  animationId = requestAnimationFrame(loop);
}
