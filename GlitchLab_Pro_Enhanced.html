<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlitchLab Pro Enhanced</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#090909;color:#fff;font-family:system-ui}
#ui{position:fixed;left:0;top:0;width:320px;height:100vh;overflow:auto;background:#151515;padding:15px;z-index:100}
#view{margin-left:320px;padding:10px}
canvas{max-width:100%;border:1px solid #333;display:block}
label{display:block;margin:10px 0;font-size:14px}
input[type=range]{width:100%}
button{padding:8px 12px;margin:4px;cursor:pointer;background:#333;color:#fff;border:1px solid #555;border-radius:4px;transition:0.2s;font-size:13px}
button:hover:not(:disabled){background:#444}
button:active:not(:disabled){transform:scale(0.98)}
button:disabled{opacity:0.5;cursor:not-allowed}
.button-group{display:flex;flex-wrap:wrap;gap:4px}
#status{margin:10px 0;padding:8px;background:#1a1a1a;border-radius:4px;font-size:12px}
#fps{color:#0f0}
.section{margin:15px 0;padding-bottom:10px;border-bottom:1px solid #333}
.section h3{margin:10px 0 8px;font-size:13px;text-transform:uppercase;color:#0f0}
select{width:100%;padding:6px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;margin:5px 0;cursor:pointer}
.param-row{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
.param-row label{margin:0;flex:1}
.param-value{font-size:12px;color:#0f0;min-width:40px}
#recordBtn{background:#c41e3a}
#recordBtn.recording{background:#00ff00;color:#000}
</style>
</head>
<body>
<div id="ui">
<h2>GlitchLab Pro</h2>

<div id="status">準備完了</div>
<div id="fps">FPS: 0</div>

<div class="section">
<div class="button-group">
<button id="start">カメラ開始</button>
<button id="stop" disabled>停止</button>
<button id="save" disabled>保存</button>
<button id="recordBtn" disabled>録画</button>
</div>
</div>

<div class="section">
<h3>プリセット</h3>
<select id="preset">
<option value="">-- プリセット選択 --</option>
<option value="cyberpunk">Cyberpunk</option>
<option value="vhs">VHS</option>
<option value="matrix">Matrix</option>
<option value="glitch">Glitch</option>
<option value="retro">Retro</option>
<option value="dream">Dream</option>
</select>
<button id="savePreset" style="width:100%;margin-top:5px">現在の設定を保存</button>
</div>

<div class="section">
<h3>基本効果</h3>
<div class="param-row">
<label>ノイズ</label>
<span class="param-value" id="noiseVal">40</span>
</div>
<input id="noise" type="range" min="0" max="150" value="40">

<div class="param-row">
<label>RGBシフト</label>
<span class="param-value" id="rgbVal">8</span>
</div>
<input id="rgb" type="range" min="0" max="30" value="8">

<div class="param-row">
<label>走査線</label>
<span class="param-value" id="scanVal">40</span>
</div>
<input id="scan" type="range" min="0" max="100" value="40">

<div class="param-row">
<label>モザイク</label>
<span class="param-value" id="pixelVal">1</span>
</div>
<input id="pixel" type="range" min="1" max="40" value="1">
</div>

<div class="section">
<h3>歪み効果</h3>
<div class="param-row">
<label>波打ち歪み</label>
<span class="param-value" id="waveVal">10</span>
</div>
<input id="wave" type="range" min="0" max="50" value="10">

<div class="param-row">
<label>樽歪み</label>
<span class="param-value" id="barrelVal">0</span>
</div>
<input id="barrel" type="range" min="0" max="50" value="0">

<div class="param-row">
<label>色収差</label>
<span class="param-value" id="abVal">5</span>
</div>
<input id="ab" type="range" min="0" max="20" value="5">

<div class="param-row">
<label>グリッチ量</label>
<span class="param-value" id="glitchVal">8</span>
</div>
<input id="glitch" type="range" min="0" max="30" value="8">
</div>

<div class="section">
<h3>追加効果</h3>
<div class="param-row">
<label>ポスター化</label>
<span class="param-value" id="posterVal">0</span>
</div>
<input id="poster" type="range" min="0" max="8" value="0">

<div class="param-row">
<label>彩度</label>
<span class="param-value" id="saturationVal">100</span>
</div>
<input id="saturation" type="range" min="0" max="200" value="100">

<div class="param-row">
<label>明るさ</label>
<span class="param-value" id="brightnessVal">100</span>
</div>
<input id="brightness" type="range" min="0" max="200" value="100">

<label><input id="invert" type="checkbox"> 色反転</label>
<label><input id="mirror" type="checkbox"> 水平反転</label>
</div>

<div class="section">
<button id="reset" style="width:100%">設定をリセット</button>
</div>
</div>

<div id="view">
<video id="video" autoplay playsinline hidden></video>
<canvas id="canvas"></canvas>
</div>

<script>
const v=document.getElementById('video');
const c=document.getElementById('canvas');
const ctx=c.getContext('2d');
let animationId=null;
let mediaStream=null;
let isRecording=false;
let mediaRecorder=null;
let recordedChunks=[];

// FPS計算
let fps=0,lastTime=Date.now(),frameCount=0;
setInterval(()=>{
  const now=Date.now();
  fps=Math.round(frameCount*1000/(now-lastTime));
  document.getElementById('fps').textContent=`FPS: ${fps}`;
  frameCount=0;
  lastTime=now;
},1000);

// パラメータ更新時に表示を更新
['noise','rgb','scan','pixel','wave','barrel','ab','glitch','poster','saturation','brightness'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    document.getElementById(id+'Val').textContent=e.target.value;
  });
});

// プリセット定義
const presets={
  cyberpunk:{noise:60,rgb:15,scan:60,pixel:2,wave:15,barrel:10,ab:8,glitch:15,poster:0,saturation:150,brightness:110,invert:false,mirror:false},
  vhs:{noise:80,rgb:8,scan:80,pixel:1,wave:5,barrel:0,ab:3,glitch:5,poster:0,saturation:80,brightness:90,invert:false,mirror:false},
  matrix:{noise:20,rgb:0,scan:30,pixel:1,wave:0,barrel:0,ab:0,glitch:0,poster:0,saturation:50,brightness:100,invert:false,mirror:false},
  glitch:{noise:100,rgb:20,scan:50,pixel:3,wave:20,barrel:5,ab:10,glitch:25,poster:2,saturation:120,brightness:100,invert:false,mirror:false},
  retro:{noise:40,rgb:5,scan:40,pixel:4,wave:0,barrel:2,ab:2,glitch:3,poster:3,saturation:100,brightness:100,invert:false,mirror:false},
  dream:{noise:30,rgb:10,scan:20,pixel:1,wave:30,barrel:15,ab:8,glitch:5,poster:1,saturation:130,brightness:110,invert:false,mirror:false}
};

document.getElementById('preset').addEventListener('change',e=>{
  if(e.target.value && presets[e.target.value]){
    const p=presets[e.target.value];
    document.getElementById('noise').value=p.noise;
    document.getElementById('rgb').value=p.rgb;
    document.getElementById('scan').value=p.scan;
    document.getElementById('pixel').value=p.pixel;
    document.getElementById('wave').value=p.wave;
    document.getElementById('barrel').value=p.barrel;
    document.getElementById('ab').value=p.ab;
    document.getElementById('glitch').value=p.glitch;
    document.getElementById('poster').value=p.poster;
    document.getElementById('saturation').value=p.saturation;
    document.getElementById('brightness').value=p.brightness;
    document.getElementById('invert').checked=p.invert;
    document.getElementById('mirror').checked=p.mirror;
    ['noise','rgb','scan','pixel','wave','barrel','ab','glitch','poster','saturation','brightness'].forEach(id=>{
      document.getElementById(id+'Val').textContent=document.getElementById(id).value;
    });
  }
});

document.getElementById('savePreset').onclick=()=>{
  const name=prompt('プリセット名:');
  if(name){
    presets[name]={
      noise:+document.getElementById('noise').value,
      rgb:+document.getElementById('rgb').value,
      scan:+document.getElementById('scan').value,
      pixel:+document.getElementById('pixel').value,
      wave:+document.getElementById('wave').value,
      barrel:+document.getElementById('barrel').value,
      ab:+document.getElementById('ab').value,
      glitch:+document.getElementById('glitch').value,
      poster:+document.getElementById('poster').value,
      saturation:+document.getElementById('saturation').value,
      brightness:+document.getElementById('brightness').value,
      invert:document.getElementById('invert').checked,
      mirror:document.getElementById('mirror').checked
    };
    localStorage.setItem('glitchlab_presets',JSON.stringify(presets));
    const opt=document.createElement('option');
    opt.value=name;
    opt.textContent=name;
    document.getElementById('preset').appendChild(opt);
    alert('保存しました');
  }
};

// ローカルストレージからプリセット読込
const saved=localStorage.getItem('glitchlab_presets');
if(saved){
  Object.assign(presets,JSON.parse(saved));
  Object.keys(presets).filter(k=>!['cyberpunk','vhs','matrix','glitch','retro','dream'].includes(k)).forEach(k=>{
    const opt=document.createElement('option');
    opt.value=k;
    opt.textContent=k;
    document.getElementById('preset').appendChild(opt);
  });
}

document.getElementById('reset').onclick=()=>{
  ['noise','rgb','scan','pixel','wave','barrel','ab','glitch','poster','saturation','brightness'].forEach(id=>{
    document.getElementById(id).value=id==='saturation'||id==='brightness'?100:id==='pixel'?1:0;
    document.getElementById(id+'Val').textContent=document.getElementById(id).value;
  });
  document.getElementById('invert').checked=false;
  document.getElementById('mirror').checked=false;
};

document.getElementById('start').onclick=async()=>{
  try{
    document.getElementById('status').textContent='カメラにアクセス中...';
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    mediaStream=s;
    v.srcObject=s;
    await v.play();
    c.width=v.videoWidth;
    c.height=v.videoHeight;
    document.getElementById('start').disabled=true;
    document.getElementById('stop').disabled=false;
    document.getElementById('save').disabled=false;
    document.getElementById('recordBtn').disabled=false;
    document.getElementById('status').textContent='実行中';
    
    // 録画設定
    const options={mimeType:'video/webm;codecs=vp9'};
    if(!MediaRecorder.isTypeSupported(options.mimeType)){
      options.mimeType='video/webm';
    }
    mediaRecorder=new MediaRecorder(mediaStream,options);
    mediaRecorder.ondataavailable=e=>recordedChunks.push(e.data);
    mediaRecorder.onstop=()=>{
      const blob=new Blob(recordedChunks,{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='glitchlab-'+Date.now()+'.webm';
      a.click();
      recordedChunks=[];
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('recordBtn').textContent='録画';
      isRecording=false;
    };
    
    loop();
  }catch(e){
    document.getElementById('status').textContent='エラー: '+e.message;
    console.error(e);
  }
};

document.getElementById('stop').onclick=()=>{
  if(mediaStream){
    mediaStream.getTracks().forEach(t=>t.stop());
    mediaStream=null;
  }
  if(animationId){
    cancelAnimationFrame(animationId);
    animationId=null;
  }
  if(isRecording){
    mediaRecorder.stop();
    isRecording=false;
  }
  document.getElementById('start').disabled=false;
  document.getElementById('stop').disabled=true;
  document.getElementById('save').disabled=true;
  document.getElementById('recordBtn').disabled=true;
  document.getElementById('status').textContent='停止中';
};

document.getElementById('recordBtn').onclick=()=>{
  if(!isRecording){
    recordedChunks=[];
    mediaRecorder.start();
    isRecording=true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordBtn').textContent='停止';
  }else{
    mediaRecorder.stop();
  }
};

function barrel(img,amount){
  if(amount<=0)return img;
  const w=c.width,h=c.height;
  const cx=w/2,cy=h/2;
  const r=Math.sqrt(cx*cx+cy*cy);
  const k=amount/100;
  const tempCanvas=document.createElement('canvas');
  tempCanvas.width=w;
  tempCanvas.height=h;
  const tempCtx=tempCanvas.getContext('2d');
  tempCtx.putImageData(img,0,0);
  
  const newImg=ctx.createImageData(w,h);
  const d=newImg.data,oldD=img.data;
  
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const dx=x-cx,dy=y-cy;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const angle=Math.atan2(dy,dx);
      const newDist=dist*(1+k*(dist/r));
      const nx=Math.round(cx+Math.cos(angle)*newDist);
      const ny=Math.round(cy+Math.sin(angle)*newDist);
      
      if(nx>=0&&nx<w&&ny>=0&&ny<h){
        const idx=(y*w+x)*4;
        const srcIdx=(ny*w+nx)*4;
        d[idx]=oldD[srcIdx];
        d[idx+1]=oldD[srcIdx+1];
        d[idx+2]=oldD[srcIdx+2];
        d[idx+3]=oldD[srcIdx+3];
      }
    }
  }
  return newImg;
}

function loop(){
  frameCount++;
  ctx.drawImage(v,0,0,c.width,c.height);
  
  if(document.getElementById('mirror').checked){
    ctx.scale(-1,1);
    ctx.drawImage(c,0,0,-c.width,c.height);
    ctx.scale(-1,1);
  }

  let img=ctx.getImageData(0,0,c.width,c.height);
  let d=img.data;

  const n=+document.getElementById('noise').value;
  const rgbs=+document.getElementById('rgb').value;
  const g=+document.getElementById('glitch').value;
  const sat=+document.getElementById('saturation').value/100;
  const bright=+document.getElementById('brightness').value/100;
  const post=+document.getElementById('poster').value;

  // ノイズ
  for(let i=0;i<d.length;i+=4){
    let r=(Math.random()-0.5)*n;
    d[i]=Math.max(0,Math.min(255,d[i]+r));
    d[i+1]=Math.max(0,Math.min(255,d[i+1]+r));
    d[i+2]=Math.max(0,Math.min(255,d[i+2]+r));
  }

  // 彩度・明るさ
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    let gray=(r+g+b)/3;
    r=gray+(r-gray)*sat;
    g=gray+(g-gray)*sat;
    b=gray+(b-gray)*sat;
    d[i]=Math.max(0,Math.min(255,r*bright));
    d[i+1]=Math.max(0,Math.min(255,g*bright));
    d[i+2]=Math.max(0,Math.min(255,b*bright));
    
    if(document.getElementById('invert').checked){
      d[i]=255-d[i];
      d[i+1]=255-d[i+1];
      d[i+2]=255-d[i+2];
    }
    
    // ポスター化
    if(post>0){
      const levels=Math.pow(2,8-post);
      d[i]=Math.floor(d[i]/levels)*levels;
      d[i+1]=Math.floor(d[i+1]/levels)*levels;
      d[i+2]=Math.floor(d[i+2]/levels)*levels;
    }
  }

  // RGBシフト
  for(let y=0;y<c.height;y++){
    let shift=Math.floor(Math.sin(y/15)*rgbs);
    for(let x=0;x<c.width-Math.abs(shift)-1;x++){
      let p=(y*c.width+x)*4;
      let q=(y*c.width+x+shift)*4;
      if(q<d.length-4){
        d[p]=d[q];
      }
    }
  }

  ctx.putImageData(img,0,0);

  // 波打ち歪み
  let waveAmp=+document.getElementById('wave').value;
  for(let y=0;y<c.height;y+=2){
    let dx=Math.sin((y+performance.now()/20)/20)*waveAmp;
    ctx.drawImage(c,0,y,c.width,2,dx,y,c.width,2);
  }

  // 樽歪み
  const barrelAmount=+document.getElementById('barrel').value;
  if(barrelAmount>0){
    img=barrel(ctx.getImageData(0,0,c.width,c.height),barrelAmount);
    ctx.putImageData(img,0,0);
  }

  // モザイク
  let pix=+document.getElementById('pixel').value;
  if(pix>1){
    let w=Math.floor(c.width/pix);
    let h=Math.floor(c.height/pix);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(c,0,0,c.width,c.height,0,0,w,h);
    ctx.drawImage(c,0,0,w,h,0,0,c.width,c.height);
  }

  // 走査線
  let sc=+document.getElementById('scan').value/100;
  if(sc>0){
    ctx.fillStyle=`rgba(0,0,0,${sc})`;
    for(let y=0;y<c.height;y+=4){
      ctx.fillRect(0,y,c.width,2);
    }
  }

  // 色収差
  let ca=+document.getElementById('ab').value;
  if(ca>0){
    ctx.globalCompositeOperation='screen';
    ctx.drawImage(c,ca,0);
    ctx.globalCompositeOperation='source-over';
  }

  // グリッチ
  for(let i=0;i<g;i++){
    let y=Math.random()*c.height;
    let h=5+Math.random()*40;
    ctx.drawImage(c,0,y,c.width,h,(Math.random()-0.5)*60,y,c.width,h);
  }

  animationId=requestAnimationFrame(loop);
}

document.getElementById('save').onclick=()=>{
  const a=document.createElement('a');
  a.href=c.toDataURL('image/png');
  a.download='glitchlab-'+Date.now()+'.png';
  a.click();
};
</script>
</body>
</html>
